"""
HubSpot Conceptual GraphQL Schema
Derived from the HubSpot REST API data model (OpenAPI specifications).
HubSpot does not currently expose a public GraphQL endpoint.
This SDL represents the CRM, CMS, Commerce, and Marketing data model.
"""

# ---------------------------------------------------------------------------
# Scalars
# ---------------------------------------------------------------------------

scalar DateTime
scalar JSON

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

enum AssociationCategory {
  HUBSPOT_DEFINED
  USER_DEFINED
  INTEGRATOR_DEFINED
}

enum FilterOperator {
  EQ
  NEQ
  LT
  LTE
  GT
  GTE
  BETWEEN
  IN
  NOT_IN
  HAS_PROPERTY
  NOT_HAS_PROPERTY
  CONTAINS_TOKEN
  NOT_CONTAINS_TOKEN
}

enum SortDirection {
  ASCENDING
  DESCENDING
}

enum PropertyType {
  STRING
  NUMBER
  DATE
  DATETIME
  ENUMERATION
  BOOL
  PHONE_NUMBER
  CURRENCY
  OBJECT_COORDINATES
}

enum PropertyFieldType {
  TEXT
  TEXTAREA
  DATE
  FILE
  NUMBER
  SELECT
  RADIO
  CHECKBOX
  BOOLEANCHECKBOX
  CALCULATION_EQUATION
  SCORE
  PHONE_NUMBER
  HTML
}

enum TicketStatus {
  OPEN
  CLOSED
}

enum DealStage {
  APPOINTMENT_SCHEDULED
  QUALIFIED_TO_BUY
  PRESENTATION_SCHEDULED
  DECISION_MAKER_BOUGHT_IN
  CONTRACT_SENT
  CLOSED_WON
  CLOSED_LOST
}

enum ObjectType {
  CONTACT
  COMPANY
  DEAL
  TICKET
  PRODUCT
  LINE_ITEM
  QUOTE
  CALL
  EMAIL
  MEETING
  NOTE
  TASK
  CUSTOM_OBJECT
}

# ---------------------------------------------------------------------------
# Shared / utility types
# ---------------------------------------------------------------------------

"""A page cursor for offset-based pagination."""
type PagingNext {
  after: String
  link: String
}

type PagingPrevious {
  before: String
  link: String
}

type Paging {
  next: PagingNext
  prev: PagingPrevious
}

type ErrorDetail {
  message: String!
  in: String
  code: String
  subCategory: String
  context: JSON
}

type StandardError {
  status: String!
  id: String
  category: String!
  subCategory: String
  message: String!
  errors: [ErrorDetail!]
  context: JSON
  links: JSON
}

# ---------------------------------------------------------------------------
# Properties & PropertyGroups
# ---------------------------------------------------------------------------

type PropertyOption {
  label: String!
  value: String!
  description: String
  displayOrder: Int
  hidden: Boolean!
}

type PropertyModificationMetadata {
  archivable: Boolean!
  readOnlyDefinition: Boolean!
  readOnlyValue: Boolean!
}

"""A single CRM object property definition."""
type Property {
  name: String!
  label: String!
  type: PropertyType!
  fieldType: PropertyFieldType!
  description: String
  groupName: String!
  options: [PropertyOption!]!
  displayOrder: Int
  calculated: Boolean!
  externalOptions: Boolean!
  hasUniqueValue: Boolean!
  hidden: Boolean!
  hubspotDefined: Boolean
  showCurrencySymbol: Boolean
  modificationMetadata: PropertyModificationMetadata
  formField: Boolean!
  createdAt: DateTime
  updatedAt: DateTime
  archived: Boolean!
  archivedAt: DateTime
}

type PropertyGroup {
  name: String!
  label: String!
  displayOrder: Int!
  archived: Boolean!
  properties: [Property!]
}

# ---------------------------------------------------------------------------
# Owners & Teams
# ---------------------------------------------------------------------------

type Team {
  id: String!
  name: String!
  primary: Boolean
}

type Owner {
  id: String!
  email: String
  firstName: String
  lastName: String
  userId: Int
  createdAt: DateTime!
  updatedAt: DateTime!
  archived: Boolean!
  teams: [Team!]
}

# ---------------------------------------------------------------------------
# Associations
# ---------------------------------------------------------------------------

type AssociationType {
  category: AssociationCategory!
  typeId: Int!
  label: String
}

type Association {
  toObjectId: String!
  associationTypes: [AssociationType!]!
}

type AssociationDefinition {
  typeId: Int!
  category: AssociationCategory!
  label: String
}

