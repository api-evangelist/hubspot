# ---------------------------------------------------------------------------
# Search input types
# ---------------------------------------------------------------------------

input FilterInput {
  propertyName: String!
  operator: FilterOperator!
  value: String
  values: [String!]
  highValue: String
}

input FilterGroupInput {
  filters: [FilterInput!]!
}

input SortInput {
  propertyName: String!
  direction: SortDirection!
}

input SearchInput {
  filterGroups: [FilterGroupInput!]
  sorts: [SortInput!]
  query: String
  properties: [String!]
  limit: Int
  after: String
}

# ---------------------------------------------------------------------------
# Root Query
# ---------------------------------------------------------------------------

type Query {
  # CRM Objects
  contact(id: String!): Contact
  contacts(search: SearchInput): ContactCollection!

  company(id: String!): Company
  companies(search: SearchInput): CompanyCollection!

  deal(id: String!): Deal
  deals(search: SearchInput): DealCollection!

  ticket(id: String!): Ticket
  tickets(search: SearchInput): TicketCollection!

  product(id: String!): Product
  products(limit: Int, after: String): ProductCollection!

  lineItem(id: String!): LineItem
  lineItems(limit: Int, after: String): LineItemCollection!

  quote(id: String!): Quote
  quotes(limit: Int, after: String): QuoteCollection!

  # Pipelines
  pipeline(objectType: ObjectType!, pipelineId: String!): Pipeline
  pipelines(objectType: ObjectType!): PipelineCollection!

  # Properties
  properties(objectType: ObjectType!): [Property!]!
  property(objectType: ObjectType!, propertyName: String!): Property
  propertyGroups(objectType: ObjectType!): [PropertyGroup!]!

  # Owners
  owner(id: String!): Owner
  owners(email: String, limit: Int, after: String): [Owner!]!

  # Lists
  list(listId: String!): CRMList
  lists(objectTypeId: String, limit: Int, after: String): CRMListCollection!

  # CMS
  domain(id: String!): Domain
  domains(limit: Int, after: String): [Domain!]!

  blogPost(id: String!): BlogPost
  blogPosts(limit: Int, after: String): [BlogPost!]!

  blogAuthor(id: String!): BlogAuthor
  blogAuthors(limit: Int, after: String): [BlogAuthor!]!

  page(id: String!): Page
  pages(limit: Int, after: String): [Page!]!

  # Marketing
  form(id: String!): Form
  forms(limit: Int, after: String): [Form!]!

  marketingEmail(id: String!): MarketingEmail
  marketingEmails(limit: Int, after: String): [MarketingEmail!]!

  # Automation
  workflow(id: String!): Workflow
  workflows(limit: Int, after: String): [Workflow!]!

  sequence(id: String!): Sequence
  sequences(limit: Int, after: String): [Sequence!]!
}

# ---------------------------------------------------------------------------
# Root Mutation
# ---------------------------------------------------------------------------

input ContactInput {
  properties: JSON!
  associations: [AssociationInput!]
}

input CompanyInput {
  properties: JSON!
  associations: [AssociationInput!]
}

input DealInput {
  properties: JSON!
  associations: [AssociationInput!]
}

input TicketInput {
  properties: JSON!
  associations: [AssociationInput!]
}

input AssociationInput {
  to: ObjectReferenceInput!
  types: [AssociationTypeInput!]!
}

input ObjectReferenceInput {
  id: String!
}

input AssociationTypeInput {
  associationCategory: AssociationCategory!
  associationTypeId: Int!
}

type Mutation {
  # Contacts
  createContact(input: ContactInput!): Contact!
  updateContact(id: String!, properties: JSON!): Contact!
  deleteContact(id: String!): Boolean!

  # Companies
  createCompany(input: CompanyInput!): Company!
  updateCompany(id: String!, properties: JSON!): Company!
  deleteCompany(id: String!): Boolean!

  # Deals
  createDeal(input: DealInput!): Deal!
  updateDeal(id: String!, properties: JSON!): Deal!
  deleteDeal(id: String!): Boolean!

  # Tickets
  createTicket(input: TicketInput!): Ticket!
  updateTicket(id: String!, properties: JSON!): Ticket!
  deleteTicket(id: String!): Boolean!

  # Associations
  createAssociation(
    fromObjectType: ObjectType!
    fromObjectId: String!
    toObjectType: ObjectType!
    toObjectId: String!
    associationTypes: [AssociationTypeInput!]!
  ): Association!

  deleteAssociation(
    fromObjectType: ObjectType!
    fromObjectId: String!
    toObjectType: ObjectType!
    toObjectId: String!
  ): Boolean!

  # List membership
  addToList(listId: String!, recordIds: [String!]!): Boolean!
  removeFromList(listId: String!, recordIds: [String!]!): Boolean!
}
