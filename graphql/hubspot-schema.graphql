  city: String
  state: String
  country: String
  zip: String
  address: String
  mobilephone: String
  hs_email_optout: Boolean
  hs_marketable_status: Boolean
  createdate: DateTime
  lastmodifieddate: DateTime
  hs_object_id: String
  hubspot_owner_id: String
