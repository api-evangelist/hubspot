- aid: hubspot:hubspot-settings-user-provisioning-api
  name: HubSpot Settings User Provisioning API
  tags:
  - Settings
  - Teams
  - Users
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/api-reference/settings-user-provisioning-v3/guide
  properties:
  - url: https://developers.hubspot.com/docs/api-reference/settings-user-provisioning-v3/guide
    type: Documentation
  description: >-
    The user provisioning API allows you to create and manage users in a HubSpot
    account along with their roles, permissions, and team assignments. You can
    add, retrieve, update, and remove users programmatically for account
    administration.
- aid: hubspot:hubspot-blog-tags-api
  name: HubSpot Blog Tags API
  tags:
  - Blogs
  - CMS
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/cms/blogs/blog-tags
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/cms/blogs/blog-tags
    type: Documentation
  description: >-
    The blog tags API allows you to create, manage, and organize blog post tags
    in HubSpot CMS. Tags help organize blog content and improve discoverability.
    You can create, retrieve, update, and delete tags, as well as manage
    multi-language tag variants.
- aid: hubspot:hubspot-cms-site-search-api
  name: HubSpot CMS Site Search API
  tags:
  - CMS
  - Content
  - Search
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/cms/site-search
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/cms/site-search
    type: Documentation
  description: >-
    The site search API allows you to search the content of HubSpot-hosted sites,
    including site pages, blog posts, landing pages, and knowledge articles. You
    can build custom site search experiences and access indexed data for
    documents with ranking customization and filtering.
- aid: hubspot:hubspot-cms-content-audit-api
  name: HubSpot CMS Content Audit API
  tags:
  - Audit
  - CMS
  - Content
  - Logs
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/cms/content-audit
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/cms/content-audit
    type: Documentation
  description: >-
    The CMS content audit API allows you to query audit logs of CMS changes that
    occurred within your HubSpot account. You can filter and sort on content
    object changes by type, time period, or HubSpot user ID to track content
    change history.
- aid: hubspot:hubspot-files-api
  name: HubSpot Files API
  tags:
  - Files
  - Storage
  - Uploads
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/library/files
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/library/files
    type: Documentation
  description: >-
    The files API allows you to upload, manage, and organize files in HubSpot's
    file manager. You can upload files, organize them into folders, control file
    accessibility and privacy settings, retrieve file details, and attach files
    to CRM records.
- aid: hubspot:hubspot-feedback-submissions-api
  name: HubSpot Feedback Submissions API
  tags:
  - CRM
  - Feedback
  - Surveys
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/crm/objects/feedback-submissions
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/crm/objects/feedback-submissions
    type: Documentation
  description: >-
    The feedback submissions API allows you to retrieve survey response data from
    HubSpot surveys including NPS, CSAT, CES, and custom surveys. This is a
    read-only API that provides access to existing survey responses and their
    associated properties.
- aid: hubspot:hubspot-leads-api
  name: HubSpot Leads API
  tags:
  - CRM
  - Leads
  - Sales
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/crm/objects/leads
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/crm/objects/leads
    type: Documentation
  description: >-
    The leads API enables you to manage lead records in HubSpot. Leads are
    contacts or companies that are potential customers who have shown interest in
    your products or services. You can create, retrieve, update, and delete lead
    records and manage their associations with contacts and other CRM objects.
- aid: hubspot:hubspot-goals-api
  name: HubSpot Goals API
  tags:
  - CRM
  - Goals
  - Quotas
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/crm/objects/goals
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/crm/objects/goals
    type: Documentation
  description: >-
    The goals API enables you to sync user-specific sales and service team quotas
    between HubSpot and external systems. Goals are used to create user-specific
    quotas based on templates provided by HubSpot, and can be retrieved, created,
    updated, and deleted through the API.
- aid: hubspot:hubspot-orders-api
  name: HubSpot Orders API
  tags:
  - Commerce
  - Ecommerce
  - Orders
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/crm/commerce/orders
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/crm/commerce/orders
    type: Documentation
  description: >-
    The orders API enables you to create and manage ecommerce order data in
    HubSpot. You can create orders, manage associations to contacts, line items,
    payments, and invoices, and track fulfillment progress using customizable
    pipelines and stages.
- aid: hubspot:hubspot-carts-api
  name: HubSpot Carts API
  tags:
  - Carts
  - Commerce
  - Ecommerce
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/crm/commerce/carts
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/crm/commerce/carts
    type: Documentation
  description: >-
    The carts API enables you to create and manage ecommerce cart data in
    HubSpot. You can sync cart information between HubSpot and external ecommerce
    platforms, manage cart properties like pricing and currency, and associate
    carts with contacts, line items, and orders.
- aid: hubspot:hubspot-invoices-api
  name: HubSpot Invoices API
  tags:
  - Billing
  - Commerce
  - Invoices
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/crm/commerce/invoices
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/crm/commerce/invoices
    type: Documentation
  description: >-
    The invoices API allows you to create, manage, retrieve, and delete invoices
    used for billing customers. Invoices progress through draft, open, paid, and
    voided statuses, and can be configured with digital payment collection via
    HubSpot Payments or Stripe.
- aid: hubspot:hubspot-taxes-api
  name: HubSpot Taxes API
  tags:
  - Commerce
  - Pricing
  - Taxes
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/crm/commerce/taxes
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/crm/commerce/taxes
    type: Documentation
  description: >-
    The taxes API enables you to create and associate tax objects as part of the
    pricing details for quotes and invoices. Taxes are used in conjunction with
    discounts and fees when determining pricing totals, with taxes applied last
    in the calculation sequence.
- aid: hubspot:hubspot-fees-api
  name: HubSpot Fees API
  tags:
  - Commerce
  - Fees
  - Pricing
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/crm/commerce/fees
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/crm/commerce/fees
    type: Documentation
  description: >-
    The fees API allows you to create and manage fees that can be included in
    invoices and legacy quotes. Fees support fixed dollar amounts or
    percentage-based values and are used alongside discounts and taxes when
    determining pricing totals.
- aid: hubspot:hubspot-discounts-api
  name: HubSpot Discounts API
  tags:
  - Commerce
  - Discounts
  - Pricing
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/crm/commerce/discounts
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/crm/commerce/discounts
    type: Documentation
  description: >-
    The discounts API enables you to create and associate discounts as part of
    the pricing details for quotes. Discounts work alongside fees and taxes in
    the quote pricing workflow, being applied first in the calculation sequence.
- aid: hubspot:hubspot-engagement-communications-api
