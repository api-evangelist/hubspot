  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/crm/engagements/communications
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/crm/engagements/communications
    type: Documentation
  description: >-
    The communications API allows you to log WhatsApp, LinkedIn, or SMS messages
    to CRM record timelines. You can create, retrieve, update, and manage
    message engagement records and associate them with contacts, companies, and
    other CRM objects.
- aid: hubspot:hubspot-engagement-postal-mail-api
  name: HubSpot Engagement Postal Mail API
  tags:
  - Activities
  - Engagements
  - Postal Mail
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/crm/engagements/postal-mail
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/crm/engagements/postal-mail
    type: Documentation
  description: >-
    The postal mail engagement API allows you to log postal mail sent to or
    received from contacts or companies on their CRM records. You can create,
    retrieve, update, and delete postal mail engagement records and associate
    them with contacts, companies, deals, and tickets.
- aid: hubspot:hubspot-transactional-email-api
  name: HubSpot Transactional Email API
  tags:
  - Marketing
  - SMTP
  - Transactional Email
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/api-reference/marketing-transactional-single-send-v3/guide
  properties:
  - url: https://developers.hubspot.com/docs/api-reference/marketing-transactional-single-send-v3/guide
    type: Documentation
  description: >-
    The transactional email API enables sending template-based transactional
    emails through HubSpot using the Single Send API and managing SMTP tokens.
    You can send emails for commerce receipts, account updates, and other
    essential business transactions over a dedicated IP address.
- aid: hubspot:hubspot-subscription-preferences-api
  name: HubSpot Subscription Preferences API
  tags:
  - Email Preferences
  - Marketing
  - Subscriptions
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/marketing/subscriptions
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/marketing/subscriptions
    type: Documentation
  description: >-
    The subscription preferences API allows you to manage email subscription
    details for contacts in your account. You can retrieve subscription types,
    check contact preferences, subscribe or unsubscribe contacts, manage
    global opt-outs, and perform bulk operations on subscription statuses.
- aid: hubspot:hubspot-timeline-events-api
  name: HubSpot Timeline Events API
  tags:
  - CRM
  - Events
  - Extensions
  - Timeline
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/crm/extensions/timeline
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/crm/extensions/timeline
    type: Documentation
  description: >-
    The timeline events API enables technology partners to send custom event data
    from external systems into HubSpot for display on CRM record activity
    timelines. You can create event templates, define custom tokens, configure
    display templates, and associate events with CRM records.
- aid: hubspot:hubspot-calling-extensions-api
  name: HubSpot Calling Extensions API
  tags:
  - Calling
  - CRM
  - Extensions
  - SDK
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/crm/extensions/calling-sdk
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/crm/extensions/calling-sdk
    type: Documentation
  description: >-
    The calling extensions SDK enables apps to provide a custom calling option to
    HubSpot users directly from CRM records. The SDK facilitates bidirectional
    communication between calling applications and HubSpot, including call event
    messaging and automatic engagement record creation.
- aid: hubspot:hubspot-video-conferencing-api
  name: HubSpot Video Conferencing API
  tags:
  - CRM
  - Extensions
  - Meetings
  - Video Conferencing
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/crm/extensions/video-conferencing
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/crm/extensions/video-conferencing
    type: Documentation
  description: >-
    The video conferencing API enables you to integrate custom video conferencing
    solutions into HubSpot's meeting creation workflow. You can configure webhook
    notifications for meeting creation, updates, and deletion, and provide
    conference link details directly in meeting invitations.
- aid: hubspot:hubspot-account-information-api
  name: HubSpot Account Information API
  tags:
  - Account
  - Configuration
  - Settings
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/api-reference/account-account-info-v3/guide
  properties:
  - url: https://developers.hubspot.com/docs/api-reference/account-account-info-v3/guide
    type: Documentation
  description: >-
    The account information API provides account configuration and usage data for
    HubSpot accounts. You can retrieve account details including portal ID, time
    zone, currency settings, and data center location, as well as monitor daily
    API call consumption.
- aid: hubspot:hubspot-business-units-api
  name: HubSpot Business Units API
  tags:
  - Brands
  - Business Units
  - Settings
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/settings/business-units-api
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/settings/business-units-api
    type: Documentation
  description: >-
    The business units (brands) API provides information about brands tied to a
    HubSpot user. You can retrieve brand data including brand name, ID, and logo
    metadata for brands associated with a specific user account.
- aid: hubspot:hubspot-currencies-api
  name: HubSpot Currencies API
  tags:
  - Currencies
  - Exchange Rates
  - Settings
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.hubapi.com
  humanURL: https://developers.hubspot.com/docs/guides/api/settings/currencies
  properties:
  - url: https://developers.hubspot.com/docs/guides/api/settings/currencies
    type: Documentation
  description: >-
    The currencies API allows you to manage the currencies used in your HubSpot
    account. You can set your account's company currency, create additional
    currencies, update exchange rates, and configure automatic exchange rate
    updates for multi-currency operations.
