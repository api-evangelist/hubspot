# HubSpot integrations, expressed as Arazzo workflows.
# Each entry maps a popular HubSpot App Marketplace integration to a forkable,
# executable Arazzo artifact whose steps call verified operationIds in the real
# OpenAPI for both ends. See the arazzo/ files alongside this index.
- slug: hubspot-salesforce
  label: Bi-directional contact sync with Salesforce
  partner: salesforce
  category: CRM
  use_case: Query a contact in Salesforce with SOQL and mirror it into the HubSpot CRM, keeping two systems of record aligned.
  arazzo: hubspot-salesforce.yml
- slug: hubspot-mailchimp
  label: Sync new HubSpot contacts into a Mailchimp audience
  partner: mailchimp
  category: Email marketing
  use_case: Create a HubSpot contact, then subscribe the same person to a Mailchimp audience list with merge fields carried across.
  arazzo: hubspot-mailchimp.yml
- slug: hubspot-slack
  label: Post real-time Slack notifications for new deals
  partner: slack
  category: Messaging
  use_case: Create a HubSpot deal, then post a real-time notification to a Slack channel announcing the new opportunity.
  arazzo: hubspot-slack.yml
- slug: hubspot-stripe
  label: Sync Stripe customers into HubSpot contacts
  partner: stripe
  category: Payments
  use_case: Create a customer in Stripe, then sync that payment customer into HubSpot as a CRM contact for revenue reporting.
  arazzo: hubspot-stripe.yml
- slug: hubspot-typeform
  label: Turn Typeform submissions into HubSpot contacts
  partner: typeform
  category: Forms
  use_case: Resolve the Typeform form behind a submission, then create a HubSpot contact from the submitted email and name.
  arazzo: hubspot-typeform.yml
- slug: hubspot-google-sheets
  label: Append HubSpot contacts as Google Sheets rows
  partner: google-sheets
  category: Spreadsheet
  use_case: Create a HubSpot contact, then append it as a new row in a Google Sheet for lightweight reporting and lists.
  arazzo: hubspot-google-sheets.yml
- slug: hubspot-zendesk
  label: Open Zendesk support tickets for HubSpot contacts
  partner: zendesk
  category: Support
  use_case: Create a HubSpot contact, then open a Zendesk support ticket with that contact as the requester.
  arazzo: hubspot-zendesk.yml
- slug: hubspot-sendgrid
  label: Add HubSpot contacts to SendGrid and send a welcome
  partner: sendgrid
  category: Email
  use_case: Create a HubSpot contact, add them to a SendGrid contact list, then send a welcome email through SendGrid.
  arazzo: hubspot-sendgrid.yml
