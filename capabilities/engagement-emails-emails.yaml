      operations:
      - name: searchemailengagements
        method: POST
        description: Hubspot Search Email Engagements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: crm-v3-objects-emails-emailId
      path: /crm/v3/objects/emails/{emailId}
      operations:
      - name: getemailengagement
        method: GET
        description: Hubspot Get an Email Engagement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: emailId
          in: path
          type: string
          description: The ID of the email engagement to retrieve.
          required: true
        - name: properties
          in: query
          type: string
          description: A comma-separated list of property names to return.
        - name: archived
          in: query
          type: boolean
          description: Whether to return archived email engagements.
      - name: updateemailengagement
        method: PATCH
        description: Hubspot Update an Email Engagement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
