naftiko: 1.0.0-alpha1
info:
  label: HubSpot CRM Management
  description: Unified CRM workflow for managing contacts, companies, deals, tickets, and their associations.
  tags:
  - HubSpot
  - CRM
  - Sales
  - Contacts
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - import: crm-contacts-api
    location: ./shared/crm-contacts-api.yaml
  - import: crm-companies-api
    location: ./shared/crm-companies-api.yaml
  - import: crm-deals-api
    location: ./shared/crm-deals-api.yaml
