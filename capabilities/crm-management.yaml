    location: ./shared/crm-associations-api.yaml
  - import: crm-search-api
    location: ./shared/crm-search-api.yaml
  - import: crm-lists-api
    location: ./shared/crm-lists-api.yaml
  exposes:
  - type: mcp
    port: 9090
    namespace: crm-management-mcp
    transport: http
    description: MCP server for AI-assisted HubSpot CRM Management.
    tools:
    - name: listcontacts
      description: HubSpot List Contacts
      hints:
        readOnly: true
      call: crm-contacts-api.listcontacts
    - name: createcontact
      description: HubSpot Create a Contact
      hints:
        readOnly: false
      call: crm-contacts-api.createcontact
    - name: getcontact
      description: HubSpot Get a Contact
      hints:
        readOnly: true
      call: crm-contacts-api.getcontact
    - name: updatecontact
      description: HubSpot Update a Contact
      hints:
        readOnly: false
      call: crm-contacts-api.updatecontact
    - name: deletecontact
      description: HubSpot Archive a Contact
      hints:
        destructive: true
      call: crm-contacts-api.deletecontact
    - name: batchreadcontacts
      description: HubSpot Batch Read Contacts
      hints:
        readOnly: false
      call: crm-contacts-api.batchreadcontacts
    - name: batchcreatecontacts
      description: HubSpot Batch Create Contacts
      hints:
        readOnly: false
      call: crm-contacts-api.batchcreatecontacts
    - name: batchupdatecontacts
      description: HubSpot Batch Update Contacts
      hints:
        readOnly: false
