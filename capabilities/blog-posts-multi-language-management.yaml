    port: 9090
    transport: http
    description: MCP adapter for HubSpot Blog Posts API — Multi-Language Management. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: hubspot-attach-post-language-group
      description: Hubspot Attach Post to Language Group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: blog-posts-multi-language-management.attachblogposttolanguagegroup
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
