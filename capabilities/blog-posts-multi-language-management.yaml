      path: /cms/v3/blogs/posts/multi-language/set-new-lang-primary
      operations:
      - name: setblogpostlanguageprimary
        method: PUT
        description: Hubspot Set New Primary Language
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.HUBSPOT_API_KEY}}'
  exposes:
  - type: rest
    namespace: blog-posts-multi-language-management-rest
    port: 8080
    description: REST adapter for HubSpot Blog Posts API — Multi-Language Management. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/cms/v3/blogs/posts/multi-language/attach-to-lang-group
      name: cms-v3-blogs-posts-multi-language-attach-to-lang-group
      description: REST surface for cms-v3-blogs-posts-multi-language-attach-to-lang-group.
      operations:
      - method: POST
        name: attachblogposttolanguagegroup
        description: Hubspot Attach Post to Language Group
        call: blog-posts-multi-language-management.attachblogposttolanguagegroup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cms/v3/blogs/posts/multi-language/create-language-variation
      name: cms-v3-blogs-posts-multi-language-create-language-variation
      description: REST surface for cms-v3-blogs-posts-multi-language-create-language-variation.
