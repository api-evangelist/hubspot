      description: Hubspot Create Language Variation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: blog-posts-multi-language-management.createblogpostlanguagevariation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: hubspot-detach-post-language-group
      description: Hubspot Detach Post From Language Group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: blog-posts-multi-language-management.detachblogpostfromlanguagegroup
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: hubspot-set-new-primary-language
      description: Hubspot Set New Primary Language
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: blog-posts-multi-language-management.setblogpostlanguageprimary
      with:
        body: tools.body
      outputParameters:
