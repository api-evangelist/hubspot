      name: cms-v3-blogs-posts-multi-language-detach-from-lang-group
      description: REST surface for cms-v3-blogs-posts-multi-language-detach-from-lang-group.
      operations:
      - method: POST
        name: detachblogpostfromlanguagegroup
        description: Hubspot Detach Post From Language Group
        call: blog-posts-multi-language-management.detachblogpostfromlanguagegroup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
