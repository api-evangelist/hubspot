naftiko: 1.0.0-alpha2
info:
  label: HubSpot Blog Posts API — Multi-Language Management
  description: 'HubSpot Blog Posts API — Multi-Language Management. 4 operations. Lead operation: Hubspot Attach Post to Language
    Group. Self-contained Naftiko capability covering one Hubspot business surface.'
  tags:
  - Hubspot
  - Multi-Language Management
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
