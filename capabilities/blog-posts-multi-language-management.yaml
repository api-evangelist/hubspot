      path: /cms/v3/blogs/posts/multi-language/attach-to-lang-group
      operations:
      - name: attachblogposttolanguagegroup
        method: POST
        description: Hubspot Attach Post to Language Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: cms-v3-blogs-posts-multi-language-create-language-variation
      path: /cms/v3/blogs/posts/multi-language/create-language-variation
      operations:
      - name: createblogpostlanguagevariation
        method: POST
        description: Hubspot Create Language Variation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: cms-v3-blogs-posts-multi-language-detach-from-lang-group
      path: /cms/v3/blogs/posts/multi-language/detach-from-lang-group
      operations:
      - name: detachblogpostfromlanguagegroup
        method: POST
        description: Hubspot Detach Post From Language Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
