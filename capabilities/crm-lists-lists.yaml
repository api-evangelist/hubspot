naftiko: 1.0.0-alpha2
info:
  label: HubSpot CRM Lists API — Lists
  description: 'HubSpot CRM Lists API — Lists. 4 operations. Lead operation: Hubspot List All Lists. Self-contained Naftiko
    capability covering one Hubspot business surface.'
  tags:
  - Hubspot
  - Lists
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUBSPOT_API_KEY: HUBSPOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: crm-lists-lists
    baseUri: https://api.hubapi.com
    description: HubSpot CRM Lists API — Lists business capability. Self-contained, no shared references.
    resources:
    - name: crm-v3-lists
      path: /crm/v3/lists
      operations:
      - name: listlists
        method: GET
        description: Hubspot List All Lists
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: The maximum number of results to return per page.
        - name: after
          in: query
          type: string
          description: The cursor for pagination to get the next page of results.
        - name: objectTypeId
          in: query
          type: string
          description: The object type ID to filter lists by (e.g., 0-1 for contacts).
        - name: listType
          in: query
          type: string
          description: Filter by list type - STATIC or DYNAMIC.
      - name: createlist
        method: POST
        description: Hubspot Create a List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: crm-v3-lists-listId
      path: /crm/v3/lists/{listId}
      operations:
      - name: getlist
        method: GET
        description: Hubspot Get a List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: listId
          in: path
          type: string
          description: The ID of the list to retrieve.
          required: true
      - name: deletelist
        method: DELETE
        description: Hubspot Delete a List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: listId
          in: path
          type: string
          description: The ID of the list to delete.
          required: true
    authentication:
      type: bearer
      token: '{{env.HUBSPOT_API_KEY}}'
  exposes:
  - type: rest
    namespace: crm-lists-lists-rest
    port: 8080
    description: REST adapter for HubSpot CRM Lists API — Lists. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/crm/v3/lists
      name: crm-v3-lists
      description: REST surface for crm-v3-lists.
      operations:
      - method: GET
        name: listlists
        description: Hubspot List All Lists
        call: crm-lists-lists.listlists
        with:
          limit: rest.limit
          after: rest.after
          objectTypeId: rest.objectTypeId
          listType: rest.listType
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createlist
        description: Hubspot Create a List
        call: crm-lists-lists.createlist
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crm/v3/lists/{listid}
      name: crm-v3-lists-listid
      description: REST surface for crm-v3-lists-listId.
      operations:
      - method: GET
        name: getlist
        description: Hubspot Get a List
        call: crm-lists-lists.getlist
        with:
          listId: rest.listId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletelist
        description: Hubspot Delete a List
        call: crm-lists-lists.deletelist
        with:
          listId: rest.listId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: crm-lists-lists-mcp
    port: 9090
    transport: http
    description: MCP adapter for HubSpot CRM Lists API — Lists. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: hubspot-list-all-lists
      description: Hubspot List All Lists
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: crm-lists-lists.listlists
      with:
        limit: tools.limit
        after: tools.after
        objectTypeId: tools.objectTypeId
        listType: tools.listType
      outputParameters:
      - type: object
        mapping: $.
    - name: hubspot-create-list
      description: Hubspot Create a List
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: crm-lists-lists.createlist
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: hubspot-get-list
      description: Hubspot Get a List
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: crm-lists-lists.getlist
      with:
        listId: tools.listId
      outputParameters:
      - type: object
        mapping: $.
    - name: hubspot-delete-list
      description: Hubspot Delete a List
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: crm-lists-lists.deletelist
      with:
        listId: tools.listId
      outputParameters:
      - type: object
        mapping: $.
