      operations:
      - name: getcontact
        method: GET
        description: Hubspot Get a Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contactId
          in: path
          type: string
          description: The ID of the contact to retrieve.
          required: true
        - name: properties
          in: query
          type: string
          description: A comma-separated list of property names to return.
        - name: archived
          in: query
          type: boolean
          description: Whether to return archived contacts.
      - name: updatecontact
