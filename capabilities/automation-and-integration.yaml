    port: 9095
    namespace: automation-and-integration-mcp
    transport: http
    description: MCP server for AI-assisted HubSpot Automation and Integration.
    tools:
    - name: completecallback
      description: HubSpot Complete a Single Callback
      hints:
        readOnly: false
      call: custom-workflow-actions-api.completecallback
    - name: batchcompletecallbacks
      description: HubSpot Complete Multiple Callbacks
      hints:
        readOnly: false
      call: custom-workflow-actions-api.batchcompletecallbacks
    - name: listactiondefinitions
      description: HubSpot List Action Definitions
      hints:
        readOnly: true
      call: custom-workflow-actions-api.listactiondefinitions
    - name: createactiondefinition
      description: HubSpot Create an Action Definition
      hints:
        readOnly: false
      call: custom-workflow-actions-api.createactiondefinition
    - name: getactiondefinitionbyid
      description: HubSpot Retrieve an Action Definition
      hints:
        readOnly: true
      call: custom-workflow-actions-api.getactiondefinitionbyid
    - name: updateactiondefinitionbyid
      description: HubSpot Update an Action Definition
