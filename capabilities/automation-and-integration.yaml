naftiko: 1.0.0-alpha2
info:
  label: HubSpot Automation and Integration
  description: Workflow automation and integration management combining custom workflow actions, OAuth, feature flags, and
    conversations.
  tags:
  - HubSpot
  - Automation
  - Integration
  - OAuth
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: custom-workflow-actions-api
    baseUri: https://api.hubapi.com
    description: "The HubSpot Custom Workflow Actions API enables developers to create, manage, and extend workflow \nautomation\
      \ capabilities within HubSpot. This API allows you to define custom actions that can be \nuse"
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: complete
      path: /complete
      description: complete operations
      operations:
      - name: completecallback
        method: POST
        description: HubSpot Complete a Single Callback
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: batchcompletecallbacks
        method: POST
        description: HubSpot Complete Multiple Callbacks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: actions
      path: /actions
      description: actions operations
      operations:
      - name: listactiondefinitions
        method: GET
        description: HubSpot List Action Definitions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createactiondefinition
        method: POST
        description: HubSpot Create an Action Definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: '{appId}'
      path: /{appId}
      description: '{appId} operations'
      operations:
      - name: getactiondefinitionbyid
        method: GET
        description: HubSpot Retrieve an Action Definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateactiondefinitionbyid
        method: PATCH
        description: HubSpot Update an Action Definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: archiveactiondefinitionbyid
        method: DELETE
        description: HubSpot Archive an Action Definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: functions
      path: /functions
      description: functions operations
      operations:
      - name: listactionfunctions
        method: GET
        description: HubSpot List Action Functions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getactionfunctionbytype
        method: GET
        description: HubSpot Retrieve Function by Type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: upsertactionfunction
        method: PUT
        description: HubSpot Create or Update a Function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteactionfunctionbytype
        method: DELETE
        description: HubSpot Delete a Function by Type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: '{functionType}'
      path: /{functionType}
      description: '{functionType} operations'
      operations:
      - name: getactionfunctionbyid
        method: GET
        description: HubSpot Retrieve a Specific Function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteactionfunctionbyid
        method: DELETE
        description: HubSpot Delete a Specific Function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: revisions
      path: /revisions
      description: revisions operations
      operations:
      - name: listactiondefinitionrevisions
        method: GET
        description: HubSpot List Definition Revisions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getactiondefinitionrevisionbyid
        method: GET
        description: HubSpot Retrieve a Specific Revision
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: oauth-api
    baseUri: https://api.hubapi.com
    description: 'The HubSpot OAuth API enables secure authentication and authorization for accessing HubSpot resources.

      Use these endpoints to manage OAuth tokens, refresh access tokens, and retrieve token metadata fo'
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: access-tokens
      path: /access-tokens
      description: access-tokens operations
      operations:
      - name: getaccesstokenmetadata
        method: GET
        description: HubSpot Retrieve Access Token Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: refresh-tokens
      path: /refresh-tokens
      description: refresh-tokens operations
      operations:
      - name: getrefreshtokenmetadata
        method: GET
        description: HubSpot Retrieve Refresh Token Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: revokerefreshtoken
        method: DELETE
        description: HubSpot Revoke a Refresh Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: token
      path: /token
      description: token operations
      operations:
      - name: createorrefreshaccesstoken
        method: POST
        description: HubSpot Create or Refresh an Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: crm-feature-flags-api
    baseUri: https://api.hubapi.com
    description: 'The HubSpot CRM Feature Flags API allows you to manage feature flags for your HubSpot applications.


      ## Overview

      Feature flags enable you to control feature rollouts at both the application and portal'
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: flags
      path: /flags
      description: flags operations
      operations:
      - name: getapplicationfeatureflag
        method: GET
        description: HubSpot Retrieve a Feature Flag Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: upsertapplicationfeatureflag
        method: PUT
        description: HubSpot Create or Update a Feature Flag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteapplicationfeatureflag
        method: DELETE
        description: HubSpot Delete a Feature Flag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: portals
      path: /portals
      description: portals operations
      operations:
      - name: listportalflagstates
        method: GET
        description: HubSpot List Portal Flag States
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getportalflagstate
        method: GET
        description: HubSpot Retrieve a Portal Flag State
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: setportalflagstate
        method: PUT
        description: HubSpot Set a Portal Flag State
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteportalflagstate
        method: DELETE
        description: HubSpot Delete a Portal Flag State
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: upsert
      path: /upsert
      description: upsert operations
      operations:
      - name: batchupsertportalflagstates
        method: POST
        description: HubSpot Batch Create or Update Portal Flag States
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: delete
      path: /delete
      description: delete operations
      operations:
      - name: batchdeleteportalflagstates
        method: POST
        description: HubSpot Batch Delete Portal Flag States
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: conversations-api
    baseUri: https://api.hubapi.com
    description: "The HubSpot Conversations API enables you to manage conversation threads, \nmessages, and inboxes programmatically.\
      \ Use this API to query existing \nconversations, send messages, manage thread assignmen"
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: inboxes
      path: /inboxes
      description: inboxes operations
      operations:
      - name: listinboxes
        method: GET
        description: HubSpot List All Inboxes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getinboxbyid
        method: GET
        description: HubSpot Retrieve an Inbox
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: threads
      path: /threads
      description: threads operations
      operations:
      - name: listthreads
        method: GET
        description: HubSpot List Conversation Threads
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getthreadbyid
        method: GET
        description: HubSpot Retrieve a Thread
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatethread
        method: PATCH
        description: HubSpot Update a Thread
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: archivethread
        method: DELETE
        description: HubSpot Archive a Thread
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: messages
      path: /messages
      description: messages operations
      operations:
      - name: listthreadmessages
        method: GET
        description: HubSpot List Thread Messages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: sendmessage
        method: POST
        description: HubSpot Send a Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getmessagebyid
        method: GET
        description: HubSpot Retrieve a Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: channels
      path: /channels
      description: channels operations
      operations:
      - name: listchannels
        method: GET
        description: HubSpot List Channels
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: actors
      path: /actors
      description: actors operations
      operations:
      - name: listactors
        method: GET
        description: HubSpot List Actors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getactorbyid
        method: GET
        description: HubSpot Retrieve an Actor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
