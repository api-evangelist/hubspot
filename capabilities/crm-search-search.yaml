naftiko: 1.0.0-alpha2
info:
  label: HubSpot CRM Search API — Search
  description: 'HubSpot CRM Search API — Search. 1 operations. Lead operation: Hubspot Search Crm Objects. Self-contained
    Naftiko capability covering one Hubspot business surface.'
  tags:
  - Hubspot
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUBSPOT_API_KEY: HUBSPOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: crm-search-search
    baseUri: https://api.hubapi.com
    description: HubSpot CRM Search API — Search business capability. Self-contained, no shared references.
    resources:
    - name: crm-v3-objects-objectType-search
      path: /crm/v3/objects/{objectType}/search
      operations:
      - name: searchcrmobjects
        method: POST
        description: Hubspot Search Crm Objects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: objectType
          in: path
          type: string
          description: The type of CRM object to search. Supported values include contacts, companies, deals, tickets, products,
            line_items, quotes, and custom object type names.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.HUBSPOT_API_KEY}}'
  exposes:
  - type: rest
    namespace: crm-search-search-rest
    port: 8080
    description: REST adapter for HubSpot CRM Search API — Search. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/crm/v3/objects/{objecttype}/search
      name: crm-v3-objects-objecttype-search
      description: REST surface for crm-v3-objects-objectType-search.
      operations:
      - method: POST
        name: searchcrmobjects
        description: Hubspot Search Crm Objects
        call: crm-search-search.searchcrmobjects
        with:
          objectType: rest.objectType
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: crm-search-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for HubSpot CRM Search API — Search. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: hubspot-search-crm-objects
      description: Hubspot Search Crm Objects
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: crm-search-search.searchcrmobjects
      with:
        objectType: tools.objectType
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
