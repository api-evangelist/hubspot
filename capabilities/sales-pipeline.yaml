naftiko: 1.0.0-alpha2
info:
  label: HubSpot Sales Pipeline
  description: Unified workflow for sales reps to manage contacts, companies, deals, engagement activities (calls, emails,
    meetings, notes, tasks), lists, and CRM search. Combines core CRM and engagement APIs for end-to-end sales operations.
  tags:
  - HubSpot
  - Sales
  - CRM
  - Pipeline
  - Engagements
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: crm-contacts
    baseUri: https://api.hubapi.com
    description: HubSpot CRM Contacts API for managing contact records.
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: contacts
      path: /crm/v3/objects/contacts
      description: Contact records
      operations:
      - name: list-contacts
        method: GET
        description: List all contacts
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum results per page
        - name: after
          in: query
          type: string
          required: false
          description: Pagination cursor
        - name: properties
          in: query
          type: string
          required: false
          description: Comma-separated properties to return
        - name: archived
          in: query
          type: boolean
          required: false
          description: Return archived contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-contact
        method: POST
        description: Create a contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            properties: '{{tools.properties}}'
    - name: contact-by-id
      path: /crm/v3/objects/contacts/{contactId}
      description: Individual contact
      operations:
      - name: get-contact
        method: GET
        description: Get a contact by ID
        inputParameters:
        - name: contactId
          in: path
          type: string
          required: true
          description: Contact ID
        - name: properties
          in: query
          type: string
          required: false
          description: Properties to return
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-contact
        method: PATCH
        description: Update a contact
        inputParameters:
        - name: contactId
          in: path
          type: string
          required: true
          description: Contact ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            properties: '{{tools.properties}}'
      - name: archive-contact
        method: DELETE
        description: Archive a contact
        inputParameters:
        - name: contactId
          in: path
          type: string
          required: true
          description: Contact ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /crm/v3/objects/contacts/search
      description: Search contacts
      operations:
      - name: search-contacts
        method: POST
        description: Search contacts with filters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            filterGroups: '{{tools.filterGroups}}'
            query: '{{tools.query}}'
            limit: '{{tools.limit}}'
            properties: '{{tools.properties}}'
    - name: batch-read
      path: /crm/v3/objects/contacts/batch/read
      description: Batch read contacts
      operations:
      - name: batch-read-contacts
        method: POST
        description: Read multiple contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            inputs: '{{tools.inputs}}'
            properties: '{{tools.properties}}'
    - name: batch-create
      path: /crm/v3/objects/contacts/batch/create
      description: Batch create contacts
      operations:
      - name: batch-create-contacts
        method: POST
        description: Create multiple contacts
