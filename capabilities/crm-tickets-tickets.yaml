    namespace: crm-tickets-tickets
    baseUri: https://api.hubapi.com
    description: HubSpot CRM Tickets API — Tickets business capability. Self-contained, no shared references.
    resources:
    - name: crm-v3-objects-tickets
      path: /crm/v3/objects/tickets
      operations:
      - name: listtickets
        method: GET
        description: Hubspot List Tickets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: The maximum number of results to return per page.
        - name: after
          in: query
          type: string
          description: The cursor for pagination to get the next page of results.
        - name: properties
          in: query
          type: string
          description: A comma-separated list of property names to return.
        - name: archived
          in: query
          type: boolean
          description: Whether to return archived tickets.
      - name: createticket
        method: POST
        description: Hubspot Create a Ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: crm-v3-objects-tickets-search
      path: /crm/v3/objects/tickets/search
      operations:
      - name: searchtickets
        method: POST
        description: Hubspot Search Tickets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: crm-v3-objects-tickets-ticketId
      path: /crm/v3/objects/tickets/{ticketId}
      operations:
      - name: getticket
        method: GET
        description: Hubspot Get a Ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ticketId
          in: path
          type: string
          description: The ID of the ticket to retrieve.
          required: true
        - name: properties
          in: query
          type: string
          description: A comma-separated list of property names to return.
        - name: archived
          in: query
          type: boolean
          description: Whether to return archived tickets.
      - name: updateticket
        method: PATCH
        description: Hubspot Update a Ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ticketId
          in: path
          type: string
          description: The ID of the ticket to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteticket
        method: DELETE
        description: Hubspot Archive a Ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ticketId
          in: path
          type: string
          description: The ID of the ticket to archive.
          required: true
    authentication:
      type: bearer
      token: '{{env.HUBSPOT_API_KEY}}'
  exposes:
  - type: rest
    namespace: crm-tickets-tickets-rest
    port: 8080
    description: REST adapter for HubSpot CRM Tickets API — Tickets. One Spectral-compliant resource per consumed operation,
