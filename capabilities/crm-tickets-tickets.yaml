          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crm/v3/objects/tickets/{ticketid}
      name: crm-v3-objects-tickets-ticketid
      description: REST surface for crm-v3-objects-tickets-ticketId.
      operations:
