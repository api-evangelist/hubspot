naftiko: 1.0.0-alpha2
info:
  label: HubSpot OAuth API — Refresh Tokens
  description: 'HubSpot OAuth API — Refresh Tokens. 2 operations. Lead operation: Hubspot Retrieve Refresh Token Metadata.
    Self-contained Naftiko capability covering one Hubspot business surface.'
  tags:
  - Hubspot
  - Refresh Tokens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUBSPOT_API_KEY: HUBSPOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: oauth-refresh-tokens
    baseUri: https://api.hubapi.com
    description: HubSpot OAuth API — Refresh Tokens business capability. Self-contained, no shared references.
    resources:
    - name: oauth-v1-refresh-tokens-token
      path: /oauth/v1/refresh-tokens/{token}
      operations:
      - name: getrefreshtokenmetadata
        method: GET
        description: Hubspot Retrieve Refresh Token Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: revokerefreshtoken
        method: DELETE
        description: Hubspot Revoke a Refresh Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: oauth-refresh-tokens-rest
    port: 8080
    description: REST adapter for HubSpot OAuth API — Refresh Tokens. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/oauth/v1/refresh-tokens/{token}
      name: oauth-v1-refresh-tokens-token
      description: REST surface for oauth-v1-refresh-tokens-token.
      operations:
      - method: GET
        name: getrefreshtokenmetadata
        description: Hubspot Retrieve Refresh Token Metadata
        call: oauth-refresh-tokens.getrefreshtokenmetadata
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: revokerefreshtoken
        description: Hubspot Revoke a Refresh Token
        call: oauth-refresh-tokens.revokerefreshtoken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: oauth-refresh-tokens-mcp
    port: 9090
    transport: http
    description: MCP adapter for HubSpot OAuth API — Refresh Tokens. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: hubspot-retrieve-refresh-token-metadata
      description: Hubspot Retrieve Refresh Token Metadata
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: oauth-refresh-tokens.getrefreshtokenmetadata
      outputParameters:
      - type: object
        mapping: $.
    - name: hubspot-revoke-refresh-token
      description: Hubspot Revoke a Refresh Token
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: oauth-refresh-tokens.revokerefreshtoken
      outputParameters:
      - type: object
        mapping: $.
