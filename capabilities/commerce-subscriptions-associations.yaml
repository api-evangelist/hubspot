naftiko: 1.0.0-alpha2
info:
  label: HubSpot Commerce Subscriptions API — Associations
  description: 'HubSpot Commerce Subscriptions API — Associations. 1 operations. Lead operation: Hubspot List Subscription
    Associations. Self-contained Naftiko capability covering one Hubspot business surface.'
  tags:
  - Hubspot
  - Associations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUBSPOT_API_KEY: HUBSPOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: commerce-subscriptions-associations
    baseUri: https://api.hubapi.com
    description: HubSpot Commerce Subscriptions API — Associations business capability. Self-contained, no shared references.
    resources:
    - name: crm-v3-objects-subscriptions-subscriptionId-associations-toObjectType
      path: /crm/v3/objects/subscriptions/{subscriptionId}/associations/{toObjectType}
      operations:
      - name: listsubscriptionassociations
        method: GET
        description: Hubspot List Subscription Associations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          description: The ID of the subscription.
          required: true
        - name: toObjectType
          in: path
          type: string
          description: The type of associated object.
          required: true
    authentication:
      type: bearer
      token: '{{env.HUBSPOT_API_KEY}}'
  exposes:
  - type: rest
    namespace: commerce-subscriptions-associations-rest
    port: 8080
    description: REST adapter for HubSpot Commerce Subscriptions API — Associations. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/crm/v3/objects/subscriptions/{subscriptionid}/associations/{toobjecttype}
      name: crm-v3-objects-subscriptions-subscriptionid-associations-toobjecttype
      description: REST surface for crm-v3-objects-subscriptions-subscriptionId-associations-toObjectType.
      operations:
      - method: GET
        name: listsubscriptionassociations
        description: Hubspot List Subscription Associations
        call: commerce-subscriptions-associations.listsubscriptionassociations
        with:
          subscriptionId: rest.subscriptionId
          toObjectType: rest.toObjectType
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: commerce-subscriptions-associations-mcp
    port: 9090
    transport: http
    description: MCP adapter for HubSpot Commerce Subscriptions API — Associations. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: hubspot-list-subscription-associations
      description: Hubspot List Subscription Associations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: commerce-subscriptions-associations.listsubscriptionassociations
      with:
        subscriptionId: tools.subscriptionId
        toObjectType: tools.toObjectType
      outputParameters:
      - type: object
        mapping: $.
