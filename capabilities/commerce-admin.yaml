naftiko: 1.0.0-alpha2
info:
  label: HubSpot Commerce Admin
  description: Unified workflow for admins to manage commerce payments, subscriptions, HubDB data tables, CMS pages, and domains.
    Combines commerce operations with CMS data management for platform administration.
  tags:
  - HubSpot
  - Commerce
  - Admin
  - CMS
  - HubDB
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: commerce-payments
    baseUri: https://api.hubapi.com
    description: HubSpot Commerce Payments API.
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: payments
      path: /crm/v3/objects/commerce_payments
      description: Commerce payment records
      operations:
      - name: list-payments
        method: GET
        description: List all commerce payments
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Max results
        - name: after
          in: query
          type: string
          required: false
          description: Cursor
        - name: properties
          in: query
          type: string
          required: false
          description: Properties
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-payment
        method: POST
        description: Create a payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            properties: '{{tools.properties}}'
    - name: payment-by-id
      path: /crm/v3/objects/commerce_payments/{commercePaymentId}
      description: Individual payment
      operations:
      - name: get-payment
        method: GET
        description: Get a payment
        inputParameters:
        - name: commercePaymentId
          in: path
          type: string
          required: true
          description: Payment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-payment
        method: PATCH
        description: Update a payment
        inputParameters:
        - name: commercePaymentId
          in: path
          type: string
          required: true
          description: Payment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            properties: '{{tools.properties}}'
      - name: archive-payment
        method: DELETE
        description: Archive a payment
        inputParameters:
        - name: commercePaymentId
          in: path
          type: string
          required: true
          description: Payment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /crm/v3/objects/commerce_payments/search
      description: Search payments
      operations:
      - name: search-payments
        method: POST
        description: Search payments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            filterGroups: '{{tools.filterGroups}}'
            query: '{{tools.query}}'
  - type: http
    namespace: commerce-subscriptions
    baseUri: https://api.hubapi.com
    description: HubSpot Commerce Subscriptions API.
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: subscriptions
      path: /crm/v3/objects/subscriptions
      description: Subscription records
      operations:
      - name: list-subscriptions
        method: GET
        description: List all subscriptions
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Max results
        - name: after
          in: query
          type: string
          required: false
          description: Cursor
        - name: properties
          in: query
          type: string
          required: false
          description: Properties
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-subscription
        method: POST
        description: Create a subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            properties: '{{tools.properties}}'
    - name: subscription-by-id
      path: /crm/v3/objects/subscriptions/{subscriptionId}
      description: Individual subscription
      operations:
      - name: get-subscription
        method: GET
        description: Get a subscription
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-subscription
        method: PATCH
        description: Update a subscription
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            properties: '{{tools.properties}}'
      - name: archive-subscription
        method: DELETE
        description: Archive a subscription
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /crm/v3/objects/subscriptions/search
      description: Search subscriptions
      operations:
      - name: search-subscriptions
        method: POST
        description: Search subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            filterGroups: '{{tools.filterGroups}}'
            query: '{{tools.query}}'
  - type: http
    namespace: cms-hubdb-api
    baseUri: https://api.hubapi.com
    description: The HubDB API allows you to create, update, and delete HubDB data tables and their rows. HubDB tables can
      be used as data sources for dynamic CMS pages and are available in both draft and published ve
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: tables
      path: /tables
      description: tables operations
      operations:
      - name: listhubdbtables
        method: GET
        description: HubSpot List HubDB Tables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createhubdbtable
        method: POST
        description: HubSpot Create a HubDB Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: gethubdbtable
        method: GET
        description: HubSpot Get a HubDB Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatehubdbtable
        method: PUT
        description: HubSpot Update a HubDB Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletehubdbtable
        method: DELETE
        description: HubSpot Delete a HubDB Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: rows
      path: /rows
      description: rows operations
      operations:
      - name: listhubdbtablerows
        method: GET
        description: HubSpot List HubDB Table Rows
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addhubdbtablerow
        method: POST
        description: HubSpot Add a Row to a HubDB Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: gethubdbtablerow
        method: GET
        description: HubSpot Get a HubDB Table Row
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatehubdbtablerow
        method: PATCH
        description: HubSpot Update a HubDB Table Row
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletehubdbtablerow
        method: DELETE
        description: HubSpot Delete a HubDB Table Row
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: push-live
      path: /push-live
      description: push-live operations
      operations:
      - name: publishhubdbtabledraft
        method: POST
        description: HubSpot Publish HubDB Table Draft
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: cms-pages-api
    baseUri: https://api.hubapi.com
    description: The CMS Pages API provides endpoints for creating and managing site pages and landing pages hosted on HubSpot.
      You can create, retrieve, update, publish, and delete both site pages and landing pages p
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: site-pages
      path: /site-pages
      description: site-pages operations
      operations:
      - name: listsitepages
        method: GET
        description: HubSpot List Site Pages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsitepage
        method: POST
        description: HubSpot Create a Site Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getsitepage
        method: GET
        description: HubSpot Get a Site Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesitepage
        method: PATCH
        description: HubSpot Update a Site Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletesitepage
        method: DELETE
        description: HubSpot Delete a Site Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: push-live
      path: /push-live
      description: push-live operations
      operations:
      - name: publishsitepage
        method: POST
        description: HubSpot Publish a Site Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: landing-pages
      path: /landing-pages
      description: landing-pages operations
      operations:
      - name: listlandingpages
        method: GET
        description: HubSpot List Landing Pages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createlandingpage
        method: POST
        description: HubSpot Create a Landing Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getlandingpage
        method: GET
        description: HubSpot Get a Landing Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletelandingpage
        method: DELETE
        description: HubSpot Delete a Landing Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: domains-api
    baseUri: https://api.hubapi.com
    description: 'The HubSpot CMS Domains API allows you to retrieve information about domains connected to a HubSpot CMS
      site.


      Use this API to:

      - List all domains connected to your HubSpot account

      - Get detailed info'
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: domains
      path: /domains
      description: domains operations
      operations:
      - name: listdomains
        method: GET
        description: HubSpot List All Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getdomainbyid
        method: GET
        description: HubSpot Get a Domain by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8084
    namespace: commerce-admin-api
    description: Unified REST API for commerce operations, data table management, and CMS administration.
    resources:
    - path: /v1/payments
      name: payments
      description: Commerce payments
      operations:
      - method: GET
        name: list-payments
        description: List payments
        call: commerce-payments.list-payments
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-payment
        description: Create payment
        call: commerce-payments.create-payment
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/{commercePaymentId}
      name: payment-by-id
      description: Individual payment
      operations:
      - method: GET
        name: get-payment
        description: Get payment
        call: commerce-payments.get-payment
        with:
          commercePaymentId: rest.commercePaymentId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions
      name: subscriptions
      description: Commerce subscriptions
      operations:
      - method: GET
        name: list-subscriptions
        description: List subscriptions
        call: commerce-subscriptions.list-subscriptions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions/{subscriptionId}
      name: subscription-by-id
      description: Individual subscription
      operations:
      - method: GET
        name: get-subscription
        description: Get subscription
        call: commerce-subscriptions.get-subscription
        with:
          subscriptionId: rest.subscriptionId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9094
    namespace: commerce-admin-mcp
    transport: http
    description: MCP server for AI-assisted commerce administration, payment tracking, and data management.
    tools:
    - name: list-payments
      description: List all commerce payments
      hints:
        readOnly: true
        idempotent: true
      call: commerce-payments.list-payments
      with:
        limit: tools.limit
        after: tools.after
      outputParameters:
      - type: object
        mapping: $.
    - name: get-payment
      description: Get a payment by ID
      hints:
        readOnly: true
        idempotent: true
      call: commerce-payments.get-payment
      with:
        commercePaymentId: tools.commercePaymentId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-payment
      description: Create a commerce payment
      hints:
        readOnly: false
      call: commerce-payments.create-payment
      with:
        properties: tools.properties
      outputParameters:
      - type: object
        mapping: $.
    - name: update-payment
      description: Update a commerce payment
      hints:
        readOnly: false
        idempotent: true
      call: commerce-payments.update-payment
      with:
        commercePaymentId: tools.commercePaymentId
        properties: tools.properties
      outputParameters:
      - type: object
        mapping: $.
    - name: search-payments
      description: Search commerce payments
      hints:
        readOnly: true
        idempotent: true
      call: commerce-payments.search-payments
      with:
        filterGroups: tools.filterGroups
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
    - name: list-subscriptions
      description: List all commerce subscriptions
      hints:
        readOnly: true
        idempotent: true
      call: commerce-subscriptions.list-subscriptions
      with:
        limit: tools.limit
        after: tools.after
      outputParameters:
      - type: object
        mapping: $.
    - name: get-subscription
      description: Get a subscription by ID
      hints:
        readOnly: true
        idempotent: true
      call: commerce-subscriptions.get-subscription
      with:
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-subscription
      description: Create a commerce subscription
      hints:
        readOnly: false
      call: commerce-subscriptions.create-subscription
      with:
        properties: tools.properties
      outputParameters:
      - type: object
        mapping: $.
    - name: search-subscriptions
      description: Search commerce subscriptions
      hints:
        readOnly: true
        idempotent: true
      call: commerce-subscriptions.search-subscriptions
      with:
        filterGroups: tools.filterGroups
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
