    namespace: engagement-tasks-tasks
    baseUri: https://api.hubapi.com
    description: HubSpot Engagement Tasks API — Tasks business capability. Self-contained, no shared references.
    resources:
    - name: crm-v3-objects-tasks
      path: /crm/v3/objects/tasks
      operations:
      - name: listtasks
        method: GET
        description: Hubspot List Tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: The maximum number of results to return per page.
        - name: after
          in: query
          type: string
          description: The cursor for pagination to get the next page of results.
        - name: properties
          in: query
          type: string
          description: A comma-separated list of property names to return.
        - name: archived
          in: query
          type: boolean
          description: Whether to return archived tasks.
      - name: createtask
        method: POST
        description: Hubspot Create a Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: crm-v3-objects-tasks-search
      path: /crm/v3/objects/tasks/search
      operations:
      - name: searchtasks
        method: POST
        description: Hubspot Search Tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: crm-v3-objects-tasks-taskId
      path: /crm/v3/objects/tasks/{taskId}
      operations:
      - name: gettask
        method: GET
        description: Hubspot Get a Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: path
          type: string
          description: The ID of the task to retrieve.
          required: true
        - name: properties
          in: query
          type: string
          description: A comma-separated list of property names to return.
        - name: archived
          in: query
          type: boolean
          description: Whether to return archived tasks.
      - name: updatetask
        method: PATCH
        description: Hubspot Update a Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: path
          type: string
          description: The ID of the task to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletetask
        method: DELETE
        description: Hubspot Archive a Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: path
          type: string
          description: The ID of the task to archive.
          required: true
    authentication:
      type: bearer
      token: '{{env.HUBSPOT_API_KEY}}'
  exposes:
  - type: rest
    namespace: engagement-tasks-tasks-rest
    port: 8080
    description: REST adapter for HubSpot Engagement Tasks API — Tasks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/crm/v3/objects/tasks
      name: crm-v3-objects-tasks
      description: REST surface for crm-v3-objects-tasks.
      operations:
      - method: GET
        name: listtasks
        description: Hubspot List Tasks
        call: engagement-tasks-tasks.listtasks
        with:
          limit: rest.limit
          after: rest.after
          properties: rest.properties
          archived: rest.archived
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtask
        description: Hubspot Create a Task
        call: engagement-tasks-tasks.createtask
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crm/v3/objects/tasks/search
      name: crm-v3-objects-tasks-search
      description: REST surface for crm-v3-objects-tasks-search.
      operations:
      - method: POST
        name: searchtasks
        description: Hubspot Search Tasks
        call: engagement-tasks-tasks.searchtasks
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crm/v3/objects/tasks/{taskid}
      name: crm-v3-objects-tasks-taskid
      description: REST surface for crm-v3-objects-tasks-taskId.
      operations:
      - method: GET
        name: gettask
        description: Hubspot Get a Task
        call: engagement-tasks-tasks.gettask
        with:
          taskId: rest.taskId
          properties: rest.properties
          archived: rest.archived
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatetask
        description: Hubspot Update a Task
        call: engagement-tasks-tasks.updatetask
        with:
          taskId: rest.taskId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
