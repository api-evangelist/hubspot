      path: /crm/v3/objects/notes
      description: Note records
      operations:
      - name: list-notes
        method: GET
        description: List all notes
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Max results
        - name: after
          in: query
          type: string
          required: false
          description: Cursor
        - name: properties
          in: query
          type: string
          required: false
          description: Properties
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-note
        method: POST
        description: Create a note
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            properties: '{{tools.properties}}'
    - name: note-by-id
      path: /crm/v3/objects/notes/{noteId}
      description: Individual note
      operations:
      - name: get-note
        method: GET
        description: Get a note
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
          description: Note ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-note
        method: PATCH
        description: Update a note
        inputParameters:
        - name: noteId
          in: path
          type: string
          required: true
          description: Note ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            properties: '{{tools.properties}}'
      - name: archive-note
        method: DELETE
