naftiko: 1.0.0-alpha1
info:
  label: HubSpot Sales Engagement
  description: Sales activity tracking workflow for calls, emails, meetings, tasks, and notes.
  tags:
  - HubSpot
  - Sales
  - Engagements
  - Activities
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - import: engagement-calls-api
    location: ./shared/engagement-calls-api.yaml
  - import: engagement-emails-api
    location: ./shared/engagement-emails-api.yaml
  - import: engagement-meetings-api
    location: ./shared/engagement-meetings-api.yaml
  - import: engagement-tasks-api
    location: ./shared/engagement-tasks-api.yaml
  - import: engagement-notes
    location: ./shared/engagement-notes.yaml
  exposes:
  - type: mcp
    port: 9093
    namespace: sales-engagement-mcp
    transport: http
    description: MCP server for AI-assisted HubSpot Sales Engagement.
    tools:
    - name: listcalls
      description: HubSpot List All Calls
      hints:
        readOnly: true
      call: engagement-calls-api.listcalls
    - name: createcall
      description: HubSpot Create a Call
      hints:
        readOnly: false
      call: engagement-calls-api.createcall
    - name: getcallbyid
      description: HubSpot Get a Call by ID
      hints:
        readOnly: true
      call: engagement-calls-api.getcallbyid
    - name: updatecall
      description: HubSpot Update a Call
      hints:
        readOnly: false
      call: engagement-calls-api.updatecall
    - name: archivecall
      description: HubSpot Archive a Call
      hints:
        destructive: true
      call: engagement-calls-api.archivecall
    - name: batchcreatecalls
      description: HubSpot Create a Batch of Calls
      hints:
        readOnly: false
      call: engagement-calls-api.batchcreatecalls
    - name: batchreadcalls
      description: HubSpot Read a Batch of Calls
      hints:
        readOnly: false
      call: engagement-calls-api.batchreadcalls
    - name: batchupdatecalls
      description: HubSpot Update a Batch of Calls
      hints:
        readOnly: false
      call: engagement-calls-api.batchupdatecalls
    - name: batcharchivecalls
      description: HubSpot Archive a Batch of Calls
      hints:
        readOnly: false
      call: engagement-calls-api.batcharchivecalls
    - name: searchcalls
      description: HubSpot Search Calls
      hints:
        readOnly: false
      call: engagement-calls-api.searchcalls
    - name: gdprdeletecall
      description: HubSpot Permanently Delete a Call for GDPR Compliance
