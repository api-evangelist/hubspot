        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: objectId
          in: path
          type: string
          description: The ID of the site page to retrieve.
          required: true
        - name: archived
          in: query
          type: boolean
          description: Whether to return archived pages.
      - name: updatesitepage
        method: PATCH
        description: Hubspot Update a Site Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
