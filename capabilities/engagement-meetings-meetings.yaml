      operations:
      - name: getmeeting
        method: GET
        description: Hubspot Get a Meeting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          description: The ID of the meeting to retrieve.
          required: true
        - name: properties
          in: query
          type: string
          description: A comma-separated list of property names to return.
        - name: archived
          in: query
          type: boolean
          description: Whether to return archived meetings.
      - name: updatemeeting
