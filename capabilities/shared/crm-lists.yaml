naftiko: "1.0.0-alpha1"

info:
  label: "HubSpot CRM Lists"
  description: "Create and manage lists of CRM records based on static membership or dynamic filter criteria."
  tags:
    - HubSpot
    - CRM
    - Lists
    - Segmentation
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: crm-lists
      baseUri: https://api.hubapi.com
      description: "HubSpot CRM Lists API for managing contact and object lists."
      authentication:
        type: bearer
        token: "{{HUBSPOT_ACCESS_TOKEN}}"
      resources:
        - name: lists
          path: /crm/v3/lists
          description: "CRM lists"
          operations:
            - name: list-lists
              method: GET
              description: "List all CRM lists"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results per page"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: listType
                  in: query
                  type: string
                  required: false
                  description: "Filter by STATIC or DYNAMIC"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-list
              method: POST
              description: "Create a new list"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  objectTypeId: "{{tools.objectTypeId}}"
                  processingType: "{{tools.processingType}}"
        - name: list-by-id
          path: /crm/v3/lists/{listId}
          description: "Individual list"
          operations:
            - name: get-list
              method: GET
              description: "Get a list by ID"
              inputParameters:
                - name: listId
                  in: path
                  type: string
                  required: true
                  description: "List ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-list
              method: PUT
              description: "Update a list"
              inputParameters:
                - name: listId
                  in: path
                  type: string
                  required: true
                  description: "List ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: delete-list
              method: DELETE
              description: "Delete a list"
              inputParameters:
                - name: listId
                  in: path
                  type: string
                  required: true
                  description: "List ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: memberships
          path: /crm/v3/lists/{listId}/memberships
          description: "List memberships"
          operations:
            - name: get-memberships
              method: GET
              description: "Get list memberships"
              inputParameters:
                - name: listId
                  in: path
                  type: string
                  required: true
                  description: "List ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8116
      namespace: crm-lists-api
      resources:
        - path: /v1/lists
          name: lists
          description: "CRM lists"
          operations:
            - method: GET
              name: list
              description: "List all lists"
              call: "crm-lists.list-lists"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/lists/{listId}
          name: list-by-id
          description: "Individual list"
          operations:
            - method: GET
              name: get
              description: "Get list"
              call: "crm-lists.get-list"
              with:
                listId: "rest.listId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9116
      namespace: crm-lists-mcp
      transport: http
      tools:
        - name: list-crm-lists
          description: "List all CRM lists"
          hints:
            readOnly: true
            idempotent: true
          call: "crm-lists.list-lists"
          with:
            limit: "tools.limit"
            after: "tools.after"
            listType: "tools.listType"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-crm-list
          description: "Get a CRM list by ID"
          hints:
            readOnly: true
            idempotent: true
          call: "crm-lists.get-list"
          with:
            listId: "tools.listId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-crm-list
          description: "Create a new CRM list"
          hints:
            readOnly: false
          call: "crm-lists.create-list"
          with:
            name: "tools.name"
            objectTypeId: "tools.objectTypeId"
            processingType: "tools.processingType"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-list-memberships
          description: "Get memberships for a CRM list"
          hints:
            readOnly: true
            idempotent: true
          call: "crm-lists.get-memberships"
          with:
            listId: "tools.listId"
          outputParameters:
            - type: object
              mapping: "$."
