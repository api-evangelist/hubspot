naftiko: 1.0.0-alpha1
info:
  label: HubSpot Commerce Subscriptions API
  description: The subscriptions API allows you to retrieve data about recurring subscription records in HubSpot Commerce. Subscriptions are created when a customer purchases a recurring product 
    through HubSpot paym
  tags:
  - HubSpot
  - API
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: commerce-subscriptions-api
    baseUri: https://api.hubapi.com
    description: The subscriptions API allows you to retrieve data about recurring subscription records in HubSpot Commerce. Subscriptions are created when a customer purchases a recurring product 
      through HubSpot paym
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: subscriptions
      path: /subscriptions
      description: subscriptions operations
      operations:
      - name: listsubscriptions
        method: GET
        description: HubSpot List Subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsubscription
        method: POST
        description: HubSpot Create a Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getsubscription
        method: GET
        description: HubSpot Get a Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesubscription
        method: PATCH
        description: HubSpot Update a Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletesubscription
        method: DELETE
        description: HubSpot Archive a Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: read
      path: /read
      description: read operations
      operations:
      - name: batchreadsubscriptions
        method: POST
        description: HubSpot Batch Read Subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: create
      path: /create
      description: create operations
      operations:
      - name: batchcreatesubscriptions
        method: POST
        description: HubSpot Batch Create Subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: update
      path: /update
      description: update operations
      operations:
      - name: batchupdatesubscriptions
        method: POST
        description: HubSpot Batch Update Subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /search
      description: search operations
      operations:
      - name: searchsubscriptions
        method: POST
        description: HubSpot Search Subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: associations
      path: /associations
      description: associations operations
      operations:
      - name: listsubscriptionassociations
        method: GET
        description: HubSpot List Subscription Associations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    port: 9106
    namespace: commerce-subscriptions-api-mcp
    transport: http
    tools:
    - name: listsubscriptions
      description: HubSpot List Subscriptions
      hints:
        readOnly: true
      call: commerce-subscriptions-api.listsubscriptions
    - name: createsubscription
      description: HubSpot Create a Subscription
      hints:
        readOnly: false
      call: commerce-subscriptions-api.createsubscription
    - name: getsubscription
      description: HubSpot Get a Subscription
      hints:
        readOnly: true
      call: commerce-subscriptions-api.getsubscription
    - name: updatesubscription
      description: HubSpot Update a Subscription
      hints:
        readOnly: false
      call: commerce-subscriptions-api.updatesubscription
    - name: deletesubscription
      description: HubSpot Archive a Subscription
      hints:
        destructive: true
      call: commerce-subscriptions-api.deletesubscription
    - name: batchreadsubscriptions
      description: HubSpot Batch Read Subscriptions
      hints:
        readOnly: false
      call: commerce-subscriptions-api.batchreadsubscriptions
    - name: batchcreatesubscriptions
      description: HubSpot Batch Create Subscriptions
      hints:
        readOnly: false
      call: commerce-subscriptions-api.batchcreatesubscriptions
    - name: batchupdatesubscriptions
      description: HubSpot Batch Update Subscriptions
      hints:
        readOnly: false
      call: commerce-subscriptions-api.batchupdatesubscriptions
    - name: searchsubscriptions
      description: HubSpot Search Subscriptions
      hints:
        readOnly: false
      call: commerce-subscriptions-api.searchsubscriptions
    - name: listsubscriptionassociations
      description: HubSpot List Subscription Associations
      hints:
        readOnly: true
      call: commerce-subscriptions-api.listsubscriptionassociations
