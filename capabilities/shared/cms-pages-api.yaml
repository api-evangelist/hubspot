naftiko: 1.0.0-alpha1
info:
  label: HubSpot CMS Pages API
  description: The CMS Pages API provides endpoints for creating and managing site pages and landing pages hosted on HubSpot. You can create, retrieve, update, publish, and delete both site pages and 
    landing pages p
  tags:
  - HubSpot
  - API
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: cms-pages-api
    baseUri: https://api.hubapi.com
    description: The CMS Pages API provides endpoints for creating and managing site pages and landing pages hosted on HubSpot. You can create, retrieve, update, publish, and delete both site pages 
      and landing pages p
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: site-pages
      path: /site-pages
      description: site-pages operations
      operations:
      - name: listsitepages
        method: GET
        description: HubSpot List Site Pages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsitepage
        method: POST
        description: HubSpot Create a Site Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getsitepage
        method: GET
        description: HubSpot Get a Site Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesitepage
        method: PATCH
        description: HubSpot Update a Site Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletesitepage
        method: DELETE
        description: HubSpot Delete a Site Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: push-live
      path: /push-live
      description: push-live operations
      operations:
      - name: publishsitepage
        method: POST
        description: HubSpot Publish a Site Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: landing-pages
      path: /landing-pages
      description: landing-pages operations
      operations:
      - name: listlandingpages
        method: GET
        description: HubSpot List Landing Pages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createlandingpage
        method: POST
        description: HubSpot Create a Landing Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getlandingpage
        method: GET
        description: HubSpot Get a Landing Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletelandingpage
        method: DELETE
        description: HubSpot Delete a Landing Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    port: 9104
    namespace: cms-pages-api-mcp
    transport: http
    tools:
    - name: listsitepages
      description: HubSpot List Site Pages
      hints:
        readOnly: true
      call: cms-pages-api.listsitepages
    - name: createsitepage
      description: HubSpot Create a Site Page
      hints:
        readOnly: false
      call: cms-pages-api.createsitepage
    - name: getsitepage
      description: HubSpot Get a Site Page
      hints:
        readOnly: true
      call: cms-pages-api.getsitepage
    - name: updatesitepage
      description: HubSpot Update a Site Page
      hints:
        readOnly: false
      call: cms-pages-api.updatesitepage
    - name: deletesitepage
      description: HubSpot Delete a Site Page
      hints:
        destructive: true
      call: cms-pages-api.deletesitepage
    - name: publishsitepage
      description: HubSpot Publish a Site Page
      hints:
        readOnly: false
      call: cms-pages-api.publishsitepage
    - name: listlandingpages
      description: HubSpot List Landing Pages
      hints:
        readOnly: true
      call: cms-pages-api.listlandingpages
    - name: createlandingpage
      description: HubSpot Create a Landing Page
      hints:
        readOnly: false
      call: cms-pages-api.createlandingpage
    - name: getlandingpage
      description: HubSpot Get a Landing Page
      hints:
        readOnly: true
      call: cms-pages-api.getlandingpage
    - name: deletelandingpage
      description: HubSpot Delete a Landing Page
      hints:
        destructive: true
      call: cms-pages-api.deletelandingpage
