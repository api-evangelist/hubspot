naftiko: 1.0.0-alpha1
info:
  label: HubSpot Blog Posts API
  description: "The HubSpot Blog Posts API enables you to manage blog posts programmatically. \nCreate, update, publish, and schedule blog posts, manage drafts and revisions, \nhandle multi-language content,
    and perfor"
  tags:
  - HubSpot
  - API
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: blog-posts-api
    baseUri: https://api.hubapi.com
    description: "The HubSpot Blog Posts API enables you to manage blog posts programmatically. \nCreate, update, publish, and schedule blog posts, manage drafts and revisions, \nhandle multi-language content,
      and perfor"
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: posts
      path: /posts
      description: posts operations
      operations:
      - name: listblogposts
        method: GET
        description: HubSpot List All Blog Posts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createblogpost
        method: POST
        description: HubSpot Create a Blog Post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getblogpostbyid
        method: GET
        description: HubSpot Retrieve a Blog Post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateblogpost
        method: PATCH
        description: HubSpot Update a Blog Post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: archiveblogpost
        method: DELETE
        description: HubSpot Archive a Blog Post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: schedule
      path: /schedule
      description: schedule operations
      operations:
      - name: scheduleblogpost
        method: POST
        description: HubSpot Schedule a Blog Post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: clone
      path: /clone
      description: clone operations
      operations:
      - name: cloneblogpost
        method: POST
        description: HubSpot Clone a Blog Post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: push-live
      path: /push-live
      description: push-live operations
      operations:
      - name: pushblogpostdraftlive
        method: POST
        description: HubSpot Push Draft to Live
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: reset
      path: /reset
      description: reset operations
      operations:
      - name: resetblogpostdraft
        method: POST
        description: HubSpot Reset Draft to Live Version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: revisions
      path: /revisions
      description: revisions operations
      operations:
      - name: getblogpostrevisions
        method: GET
        description: HubSpot Get Revision History
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: restore
      path: /restore
      description: restore operations
      operations:
      - name: restoreblogpostrevision
        method: POST
        description: HubSpot Restore a Previous Version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: read
      path: /read
      description: read operations
      operations:
      - name: batchreadblogposts
        method: POST
        description: HubSpot Read Multiple Blog Posts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: create
      path: /create
      description: create operations
      operations:
      - name: batchcreateblogposts
        method: POST
        description: HubSpot Create Multiple Blog Posts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: update
      path: /update
      description: update operations
      operations:
      - name: batchupdateblogposts
        method: POST
        description: HubSpot Update Multiple Blog Posts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: archive
      path: /archive
      description: archive operations
      operations:
      - name: batcharchiveblogposts
        method: POST
        description: HubSpot Archive Multiple Blog Posts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: detach-from-lang-group
      path: /detach-from-lang-group
      description: detach-from-lang-group operations
      operations:
      - name: detachblogpostfromlanguagegroup
        method: POST
        description: HubSpot Detach Post from Language Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: set-new-lang-primary
      path: /set-new-lang-primary
      description: set-new-lang-primary operations
      operations:
      - name: setblogpostlanguageprimary
        method: PUT
        description: HubSpot Set New Primary Language
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: attach-to-lang-group
      path: /attach-to-lang-group
      description: attach-to-lang-group operations
      operations:
      - name: attachblogposttolanguagegroup
        method: POST
        description: HubSpot Attach Post to Language Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: create-language-variation
      path: /create-language-variation
      description: create-language-variation operations
      operations:
      - name: createblogpostlanguagevariation
        method: POST
        description: HubSpot Create Language Variation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    port: 9102
    namespace: blog-posts-api-mcp
    transport: http
    tools:
    - name: listblogposts
      description: HubSpot List All Blog Posts
      hints:
        readOnly: true
      call: blog-posts-api.listblogposts
    - name: createblogpost
      description: HubSpot Create a Blog Post
      hints:
        readOnly: false
      call: blog-posts-api.createblogpost
    - name: getblogpostbyid
      description: HubSpot Retrieve a Blog Post
      hints:
        readOnly: true
      call: blog-posts-api.getblogpostbyid
    - name: updateblogpost
      description: HubSpot Update a Blog Post
      hints:
        readOnly: false
      call: blog-posts-api.updateblogpost
    - name: archiveblogpost
      description: HubSpot Archive a Blog Post
      hints:
        destructive: true
      call: blog-posts-api.archiveblogpost
    - name: scheduleblogpost
      description: HubSpot Schedule a Blog Post
      hints:
        readOnly: false
      call: blog-posts-api.scheduleblogpost
    - name: cloneblogpost
      description: HubSpot Clone a Blog Post
      hints:
        readOnly: false
      call: blog-posts-api.cloneblogpost
    - name: pushblogpostdraftlive
      description: HubSpot Push Draft to Live
      hints:
        readOnly: false
      call: blog-posts-api.pushblogpostdraftlive
    - name: resetblogpostdraft
      description: HubSpot Reset Draft to Live Version
      hints:
        readOnly: false
      call: blog-posts-api.resetblogpostdraft
    - name: getblogpostrevisions
      description: HubSpot Get Revision History
      hints:
        readOnly: true
      call: blog-posts-api.getblogpostrevisions
    - name: restoreblogpostrevision
      description: HubSpot Restore a Previous Version
      hints:
        readOnly: false
      call: blog-posts-api.restoreblogpostrevision
    - name: batchreadblogposts
      description: HubSpot Read Multiple Blog Posts
      hints:
        readOnly: false
      call: blog-posts-api.batchreadblogposts
    - name: batchcreateblogposts
      description: HubSpot Create Multiple Blog Posts
      hints:
        readOnly: false
      call: blog-posts-api.batchcreateblogposts
    - name: batchupdateblogposts
      description: HubSpot Update Multiple Blog Posts
      hints:
        readOnly: false
      call: blog-posts-api.batchupdateblogposts
    - name: batcharchiveblogposts
      description: HubSpot Archive Multiple Blog Posts
      hints:
        readOnly: false
      call: blog-posts-api.batcharchiveblogposts
    - name: detachblogpostfromlanguagegroup
      description: HubSpot Detach Post from Language Group
      hints:
        readOnly: false
      call: blog-posts-api.detachblogpostfromlanguagegroup
    - name: setblogpostlanguageprimary
      description: HubSpot Set New Primary Language
      hints:
        readOnly: false
      call: blog-posts-api.setblogpostlanguageprimary
    - name: attachblogposttolanguagegroup
      description: HubSpot Attach Post to Language Group
      hints:
        readOnly: false
      call: blog-posts-api.attachblogposttolanguagegroup
    - name: createblogpostlanguagevariation
      description: HubSpot Create Language Variation
      hints:
        readOnly: false
      call: blog-posts-api.createblogpostlanguagevariation
