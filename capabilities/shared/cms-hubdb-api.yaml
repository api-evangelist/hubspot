naftiko: 1.0.0-alpha1
info:
  label: HubSpot CMS HubDB API
  description: The HubDB API allows you to create, update, and delete HubDB data tables and their rows. HubDB tables can be used as data sources for dynamic CMS pages and are available in both draft 
    and published ve
  tags:
  - HubSpot
  - API
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: cms-hubdb-api
    baseUri: https://api.hubapi.com
    description: The HubDB API allows you to create, update, and delete HubDB data tables and their rows. HubDB tables can be used as data sources for dynamic CMS pages and are available in both draft
      and published ve
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: tables
      path: /tables
      description: tables operations
      operations:
      - name: listhubdbtables
        method: GET
        description: HubSpot List HubDB Tables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createhubdbtable
        method: POST
        description: HubSpot Create a HubDB Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: gethubdbtable
        method: GET
        description: HubSpot Get a HubDB Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatehubdbtable
        method: PUT
        description: HubSpot Update a HubDB Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletehubdbtable
        method: DELETE
        description: HubSpot Delete a HubDB Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: rows
      path: /rows
      description: rows operations
      operations:
      - name: listhubdbtablerows
        method: GET
        description: HubSpot List HubDB Table Rows
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addhubdbtablerow
        method: POST
        description: HubSpot Add a Row to a HubDB Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: gethubdbtablerow
        method: GET
        description: HubSpot Get a HubDB Table Row
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatehubdbtablerow
        method: PATCH
        description: HubSpot Update a HubDB Table Row
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletehubdbtablerow
        method: DELETE
        description: HubSpot Delete a HubDB Table Row
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: push-live
      path: /push-live
      description: push-live operations
      operations:
      - name: publishhubdbtabledraft
        method: POST
        description: HubSpot Publish HubDB Table Draft
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    port: 9103
    namespace: cms-hubdb-api-mcp
    transport: http
    tools:
    - name: listhubdbtables
      description: HubSpot List HubDB Tables
      hints:
        readOnly: true
      call: cms-hubdb-api.listhubdbtables
    - name: createhubdbtable
      description: HubSpot Create a HubDB Table
      hints:
        readOnly: false
      call: cms-hubdb-api.createhubdbtable
    - name: gethubdbtable
      description: HubSpot Get a HubDB Table
      hints:
        readOnly: true
      call: cms-hubdb-api.gethubdbtable
    - name: updatehubdbtable
      description: HubSpot Update a HubDB Table
      hints:
        readOnly: false
      call: cms-hubdb-api.updatehubdbtable
    - name: deletehubdbtable
      description: HubSpot Delete a HubDB Table
      hints:
        destructive: true
      call: cms-hubdb-api.deletehubdbtable
    - name: listhubdbtablerows
      description: HubSpot List HubDB Table Rows
      hints:
        readOnly: true
      call: cms-hubdb-api.listhubdbtablerows
    - name: addhubdbtablerow
      description: HubSpot Add a Row to a HubDB Table
      hints:
        readOnly: false
      call: cms-hubdb-api.addhubdbtablerow
    - name: gethubdbtablerow
      description: HubSpot Get a HubDB Table Row
      hints:
        readOnly: true
      call: cms-hubdb-api.gethubdbtablerow
    - name: updatehubdbtablerow
      description: HubSpot Update a HubDB Table Row
      hints:
        readOnly: false
      call: cms-hubdb-api.updatehubdbtablerow
    - name: deletehubdbtablerow
      description: HubSpot Delete a HubDB Table Row
      hints:
        destructive: true
      call: cms-hubdb-api.deletehubdbtablerow
    - name: publishhubdbtabledraft
      description: HubSpot Publish HubDB Table Draft
      hints:
        readOnly: false
      call: cms-hubdb-api.publishhubdbtabledraft
