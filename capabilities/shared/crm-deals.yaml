naftiko: "1.0.0-alpha1"

info:
  label: "HubSpot CRM Deals"
  description: "Manage deal records tracking sales opportunities through pipeline stages in HubSpot CRM."
  tags:
    - HubSpot
    - CRM
    - Deals
    - Sales
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: crm-deals
      baseUri: https://api.hubapi.com
      description: "HubSpot CRM Deals API for managing sales deal records."
      authentication:
        type: bearer
        token: "{{HUBSPOT_ACCESS_TOKEN}}"
      resources:
        - name: deals
          path: /crm/v3/objects/deals
          description: "Deal records"
          operations:
            - name: list-deals
              method: GET
              description: "List all deals"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results per page"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: properties
                  in: query
                  type: string
                  required: false
                  description: "Properties to return"
                - name: archived
                  in: query
                  type: boolean
                  required: false
                  description: "Return archived deals"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-deal
              method: POST
              description: "Create a deal"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  properties: "{{tools.properties}}"
        - name: deal-by-id
          path: /crm/v3/objects/deals/{dealId}
          description: "Individual deal"
          operations:
            - name: get-deal
              method: GET
              description: "Get a deal by ID"
              inputParameters:
                - name: dealId
                  in: path
                  type: string
                  required: true
                  description: "Deal ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-deal
              method: PATCH
              description: "Update a deal"
              inputParameters:
                - name: dealId
                  in: path
                  type: string
                  required: true
                  description: "Deal ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  properties: "{{tools.properties}}"
            - name: archive-deal
              method: DELETE
              description: "Archive a deal"
              inputParameters:
                - name: dealId
                  in: path
                  type: string
                  required: true
                  description: "Deal ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: search
          path: /crm/v3/objects/deals/search
          description: "Search deals"
          operations:
            - name: search-deals
              method: POST
              description: "Search deals with filters"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  filterGroups: "{{tools.filterGroups}}"
                  query: "{{tools.query}}"
                  limit: "{{tools.limit}}"
                  properties: "{{tools.properties}}"

  exposes:
    - type: rest
      port: 8105
      namespace: crm-deals-api
      resources:
        - path: /v1/deals
          name: deals
          description: "Deal records"
          operations:
            - method: GET
              name: list
              description: "List deals"
              call: "crm-deals.list-deals"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create
              description: "Create deal"
              call: "crm-deals.create-deal"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/deals/{dealId}
          name: deal-by-id
          description: "Individual deal"
          operations:
            - method: GET
              name: get
              description: "Get deal"
              call: "crm-deals.get-deal"
              with:
                dealId: "rest.dealId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update
              description: "Update deal"
              call: "crm-deals.update-deal"
              with:
                dealId: "rest.dealId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: archive
              description: "Archive deal"
              call: "crm-deals.archive-deal"
              with:
                dealId: "rest.dealId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9105
      namespace: crm-deals-mcp
      transport: http
      tools:
        - name: list-deals
          description: "List all deals in HubSpot CRM"
          hints:
            readOnly: true
            idempotent: true
          call: "crm-deals.list-deals"
          with:
            limit: "tools.limit"
            after: "tools.after"
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-deal
          description: "Retrieve a deal by ID"
          hints:
            readOnly: true
            idempotent: true
          call: "crm-deals.get-deal"
          with:
            dealId: "tools.dealId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-deal
          description: "Create a new deal"
          hints:
            readOnly: false
          call: "crm-deals.create-deal"
          with:
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-deal
          description: "Update an existing deal"
          hints:
            readOnly: false
            idempotent: true
          call: "crm-deals.update-deal"
          with:
            dealId: "tools.dealId"
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
        - name: archive-deal
          description: "Archive a deal"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "crm-deals.archive-deal"
          with:
            dealId: "tools.dealId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-deals
          description: "Search deals using filters"
          hints:
            readOnly: true
            idempotent: true
          call: "crm-deals.search-deals"
          with:
            filterGroups: "tools.filterGroups"
            query: "tools.query"
            limit: "tools.limit"
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
