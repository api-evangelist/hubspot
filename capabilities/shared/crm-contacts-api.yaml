naftiko: 1.0.0-alpha1
info:
  label: HubSpot CRM Contacts API
  description: Contact records store information about individuals. The contacts endpoints allow you to manage contact data and sync it between HubSpot and other systems. You can create, retrieve, 
    update, and delete
  tags:
  - HubSpot
  - API
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: crm-contacts-api
    baseUri: https://api.hubapi.com
    description: Contact records store information about individuals. The contacts endpoints allow you to manage contact data and sync it between HubSpot and other systems. You can create, retrieve, 
      update, and delete
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: contacts
      path: /contacts
      description: contacts operations
      operations:
      - name: listcontacts
        method: GET
        description: HubSpot List Contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcontact
        method: POST
        description: HubSpot Create a Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getcontact
        method: GET
        description: HubSpot Get a Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatecontact
        method: PATCH
        description: HubSpot Update a Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletecontact
        method: DELETE
        description: HubSpot Archive a Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: read
      path: /read
      description: read operations
      operations:
      - name: batchreadcontacts
        method: POST
        description: HubSpot Batch Read Contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: create
      path: /create
      description: create operations
      operations:
      - name: batchcreatecontacts
        method: POST
        description: HubSpot Batch Create Contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: update
      path: /update
      description: update operations
      operations:
      - name: batchupdatecontacts
        method: POST
        description: HubSpot Batch Update Contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: archive
      path: /archive
      description: archive operations
      operations:
      - name: batcharchivecontacts
        method: POST
        description: HubSpot Batch Archive Contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /search
      description: search operations
      operations:
      - name: searchcontacts
        method: POST
        description: HubSpot Search Contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: associations
      path: /associations
      description: associations operations
      operations:
      - name: listcontactassociations
        method: GET
        description: HubSpot List Contact Associations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: '{toObjectId}'
      path: /{toObjectId}
      description: '{toObjectId} operations'
      operations:
      - name: createcontactassociation
        method: PUT
        description: HubSpot Create a Contact Association
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletecontactassociation
        method: DELETE
        description: HubSpot Delete a Contact Association
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    port: 9110
    namespace: crm-contacts-api-mcp
    transport: http
    tools:
    - name: listcontacts
      description: HubSpot List Contacts
      hints:
        readOnly: true
      call: crm-contacts-api.listcontacts
    - name: createcontact
      description: HubSpot Create a Contact
      hints:
        readOnly: false
      call: crm-contacts-api.createcontact
    - name: getcontact
      description: HubSpot Get a Contact
      hints:
        readOnly: true
      call: crm-contacts-api.getcontact
    - name: updatecontact
      description: HubSpot Update a Contact
      hints:
        readOnly: false
      call: crm-contacts-api.updatecontact
    - name: deletecontact
      description: HubSpot Archive a Contact
      hints:
        destructive: true
      call: crm-contacts-api.deletecontact
    - name: batchreadcontacts
      description: HubSpot Batch Read Contacts
      hints:
        readOnly: false
      call: crm-contacts-api.batchreadcontacts
    - name: batchcreatecontacts
      description: HubSpot Batch Create Contacts
      hints:
        readOnly: false
      call: crm-contacts-api.batchcreatecontacts
    - name: batchupdatecontacts
      description: HubSpot Batch Update Contacts
      hints:
        readOnly: false
      call: crm-contacts-api.batchupdatecontacts
    - name: batcharchivecontacts
      description: HubSpot Batch Archive Contacts
      hints:
        readOnly: false
      call: crm-contacts-api.batcharchivecontacts
    - name: searchcontacts
      description: HubSpot Search Contacts
      hints:
        readOnly: false
      call: crm-contacts-api.searchcontacts
    - name: listcontactassociations
      description: HubSpot List Contact Associations
      hints:
        readOnly: true
      call: crm-contacts-api.listcontactassociations
    - name: createcontactassociation
      description: HubSpot Create a Contact Association
      hints:
        readOnly: false
      call: crm-contacts-api.createcontactassociation
    - name: deletecontactassociation
      description: HubSpot Delete a Contact Association
      hints:
        destructive: true
      call: crm-contacts-api.deletecontactassociation
