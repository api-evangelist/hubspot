naftiko: "1.0.0-alpha1"

info:
  label: "HubSpot Engagement Emails"
  description: "Manage email engagement records for tracking sent email activity in HubSpot CRM."
  tags:
    - HubSpot
    - CRM
    - Engagements
    - Emails
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: engagement-emails
      baseUri: https://api.hubapi.com
      description: "HubSpot Engagement Emails API for managing email activity records."
      authentication:
        type: bearer
        token: "{{HUBSPOT_ACCESS_TOKEN}}"
      resources:
        - name: emails
          path: /crm/v3/objects/emails
          description: "Email engagement records"
          operations:
            - name: list-email-engagements
              method: GET
              description: "List all email engagements"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results per page"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: properties
                  in: query
                  type: string
                  required: false
                  description: "Properties to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-email-engagement
              method: POST
              description: "Create an email engagement"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  properties: "{{tools.properties}}"
        - name: email-by-id
          path: /crm/v3/objects/emails/{emailId}
          description: "Individual email engagement"
          operations:
            - name: get-email-engagement
              method: GET
              description: "Get an email engagement by ID"
              inputParameters:
                - name: emailId
                  in: path
                  type: string
                  required: true
                  description: "Email engagement ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-email-engagement
              method: PATCH
              description: "Update an email engagement"
              inputParameters:
                - name: emailId
                  in: path
                  type: string
                  required: true
                  description: "Email engagement ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  properties: "{{tools.properties}}"
            - name: archive-email-engagement
              method: DELETE
              description: "Archive an email engagement"
              inputParameters:
                - name: emailId
                  in: path
                  type: string
                  required: true
                  description: "Email engagement ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8110
      namespace: engagement-emails-api
      resources:
        - path: /v1/email-engagements
          name: email-engagements
          description: "Email engagement records"
          operations:
            - method: GET
              name: list
              description: "List email engagements"
              call: "engagement-emails.list-email-engagements"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9110
      namespace: engagement-emails-mcp
      transport: http
      tools:
        - name: list-email-engagements
          description: "List all email engagements"
          hints:
            readOnly: true
            idempotent: true
          call: "engagement-emails.list-email-engagements"
          with:
            limit: "tools.limit"
            after: "tools.after"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-email-engagement
          description: "Get an email engagement by ID"
          hints:
            readOnly: true
            idempotent: true
          call: "engagement-emails.get-email-engagement"
          with:
            emailId: "tools.emailId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-email-engagement
          description: "Log a new email engagement"
          hints:
            readOnly: false
          call: "engagement-emails.create-email-engagement"
          with:
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
