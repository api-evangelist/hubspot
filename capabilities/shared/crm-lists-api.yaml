naftiko: 1.0.0-alpha1
info:
  label: HubSpot CRM Lists API
  description: The Lists API allows you to create and manage lists of CRM records based on static membership or dynamic filter criteria. Lists can be used to segment contacts, companies, and other CRM
    objects for ma
  tags:
  - HubSpot
  - API
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: crm-lists-api
    baseUri: https://api.hubapi.com
    description: The Lists API allows you to create and manage lists of CRM records based on static membership or dynamic filter criteria. Lists can be used to segment contacts, companies, and other 
      CRM objects for ma
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: lists
      path: /lists
      description: lists operations
      operations:
      - name: listlists
        method: GET
        description: HubSpot List All Lists
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createlist
        method: POST
        description: HubSpot Create a List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getlist
        method: GET
        description: HubSpot Get a List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletelist
        method: DELETE
        description: HubSpot Delete a List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: memberships
      path: /memberships
      description: memberships operations
      operations:
      - name: getlistmemberships
        method: GET
        description: HubSpot Get List Members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: add
      path: /add
      description: add operations
      operations:
      - name: addlistmembers
        method: PUT
        description: HubSpot Add Members to a List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: remove
      path: /remove
      description: remove operations
      operations:
      - name: removelistmembers
        method: PUT
        description: HubSpot Remove Members from a List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    port: 9113
    namespace: crm-lists-api-mcp
    transport: http
    tools:
    - name: listlists
      description: HubSpot List All Lists
      hints:
        readOnly: true
      call: crm-lists-api.listlists
    - name: createlist
      description: HubSpot Create a List
      hints:
        readOnly: false
      call: crm-lists-api.createlist
    - name: getlist
      description: HubSpot Get a List
      hints:
        readOnly: true
      call: crm-lists-api.getlist
    - name: deletelist
      description: HubSpot Delete a List
      hints:
        destructive: true
      call: crm-lists-api.deletelist
    - name: getlistmemberships
      description: HubSpot Get List Members
      hints:
        readOnly: true
      call: crm-lists-api.getlistmemberships
    - name: addlistmembers
      description: HubSpot Add Members to a List
      hints:
        readOnly: false
      call: crm-lists-api.addlistmembers
    - name: removelistmembers
      description: HubSpot Remove Members from a List
      hints:
        readOnly: false
      call: crm-lists-api.removelistmembers
