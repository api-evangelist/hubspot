naftiko: 1.0.0-alpha1
info:
  label: HubSpot CRM Deals API
  description: A deal stores data about an ongoing transaction or sales opportunity. The deals endpoints allow you to manage deal records and sync data between HubSpot and other systems, supporting 
    the full lifecycl
  tags:
  - HubSpot
  - API
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: crm-deals-api
    baseUri: https://api.hubapi.com
    description: A deal stores data about an ongoing transaction or sales opportunity. The deals endpoints allow you to manage deal records and sync data between HubSpot and other systems, supporting 
      the full lifecycl
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: deals
      path: /deals
      description: deals operations
      operations:
      - name: listdeals
        method: GET
        description: HubSpot List Deals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createdeal
        method: POST
        description: HubSpot Create a Deal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getdeal
        method: GET
        description: HubSpot Get a Deal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatedeal
        method: PATCH
        description: HubSpot Update a Deal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletedeal
        method: DELETE
        description: HubSpot Archive a Deal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: read
      path: /read
      description: read operations
      operations:
      - name: batchreaddeals
        method: POST
        description: HubSpot Batch Read Deals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: create
      path: /create
      description: create operations
      operations:
      - name: batchcreatedeals
        method: POST
        description: HubSpot Batch Create Deals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: update
      path: /update
      description: update operations
      operations:
      - name: batchupdatedeals
        method: POST
        description: HubSpot Batch Update Deals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: archive
      path: /archive
      description: archive operations
      operations:
      - name: batcharchivedeals
        method: POST
        description: HubSpot Batch Archive Deals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /search
      description: search operations
      operations:
      - name: searchdeals
        method: POST
        description: HubSpot Search Deals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: associations
      path: /associations
      description: associations operations
      operations:
      - name: listdealassociations
        method: GET
        description: HubSpot List Deal Associations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: '{toObjectId}'
      path: /{toObjectId}
      description: '{toObjectId} operations'
      operations:
      - name: createdealassociation
        method: PUT
        description: HubSpot Create a Deal Association
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletedealassociation
        method: DELETE
        description: HubSpot Delete a Deal Association
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    port: 9111
    namespace: crm-deals-api-mcp
    transport: http
    tools:
    - name: listdeals
      description: HubSpot List Deals
      hints:
        readOnly: true
      call: crm-deals-api.listdeals
    - name: createdeal
      description: HubSpot Create a Deal
      hints:
        readOnly: false
      call: crm-deals-api.createdeal
    - name: getdeal
      description: HubSpot Get a Deal
      hints:
        readOnly: true
      call: crm-deals-api.getdeal
    - name: updatedeal
      description: HubSpot Update a Deal
      hints:
        readOnly: false
      call: crm-deals-api.updatedeal
    - name: deletedeal
      description: HubSpot Archive a Deal
      hints:
        destructive: true
      call: crm-deals-api.deletedeal
    - name: batchreaddeals
      description: HubSpot Batch Read Deals
      hints:
        readOnly: false
      call: crm-deals-api.batchreaddeals
    - name: batchcreatedeals
      description: HubSpot Batch Create Deals
      hints:
        readOnly: false
      call: crm-deals-api.batchcreatedeals
    - name: batchupdatedeals
      description: HubSpot Batch Update Deals
      hints:
        readOnly: false
      call: crm-deals-api.batchupdatedeals
    - name: batcharchivedeals
      description: HubSpot Batch Archive Deals
      hints:
        readOnly: false
      call: crm-deals-api.batcharchivedeals
    - name: searchdeals
      description: HubSpot Search Deals
      hints:
        readOnly: false
      call: crm-deals-api.searchdeals
    - name: listdealassociations
      description: HubSpot List Deal Associations
      hints:
        readOnly: true
      call: crm-deals-api.listdealassociations
    - name: createdealassociation
      description: HubSpot Create a Deal Association
      hints:
        readOnly: false
      call: crm-deals-api.createdealassociation
    - name: deletedealassociation
      description: HubSpot Delete a Deal Association
      hints:
        destructive: true
      call: crm-deals-api.deletedealassociation
