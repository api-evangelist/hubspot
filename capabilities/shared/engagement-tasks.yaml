naftiko: "1.0.0-alpha1"
info:
  label: "HubSpot Engagement Tasks"
  description: "Manage task engagement records for tracking follow-up actions in HubSpot CRM."
  tags:
    - HubSpot
    - CRM
    - Engagements
    - Tasks
  created: "2026-04-18"
  modified: "2026-04-18"
binds:
  - namespace: env
    keys:
      HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
    - type: http
      namespace: engagement-tasks
      baseUri: https://api.hubapi.com
      description: "HubSpot Engagement Tasks API."
      authentication:
        type: bearer
        token: "{{HUBSPOT_ACCESS_TOKEN}}"
      resources:
        - name: tasks
          path: /crm/v3/objects/tasks
          description: "Task records"
          operations:
            - name: list-tasks
              method: GET
              description: "List all tasks"
              inputParameters:
                - { name: limit, in: query, type: integer, required: false, description: "Max results" }
                - { name: after, in: query, type: string, required: false, description: "Cursor" }
                - { name: properties, in: query, type: string, required: false, description: "Properties" }
              outputRawFormat: json
              outputParameters: [{ name: result, type: object, value: "$." }]
            - name: create-task
              method: POST
              description: "Create a task"
              outputRawFormat: json
              outputParameters: [{ name: result, type: object, value: "$." }]
              body: { type: json, data: { properties: "{{tools.properties}}" } }
        - name: task-by-id
          path: /crm/v3/objects/tasks/{taskId}
          description: "Individual task"
          operations:
            - name: get-task
              method: GET
              description: "Get a task"
              inputParameters:
                - { name: taskId, in: path, type: string, required: true, description: "Task ID" }
              outputRawFormat: json
              outputParameters: [{ name: result, type: object, value: "$." }]
            - name: update-task
              method: PATCH
              description: "Update a task"
              inputParameters:
                - { name: taskId, in: path, type: string, required: true, description: "Task ID" }
              outputRawFormat: json
              outputParameters: [{ name: result, type: object, value: "$." }]
              body: { type: json, data: { properties: "{{tools.properties}}" } }
            - name: archive-task
              method: DELETE
              description: "Archive a task"
              inputParameters:
                - { name: taskId, in: path, type: string, required: true, description: "Task ID" }
              outputRawFormat: json
              outputParameters: [{ name: result, type: object, value: "$." }]
  exposes:
    - type: rest
      port: 8113
      namespace: engagement-tasks-api
      resources:
        - path: /v1/tasks
          name: tasks
          description: "Task records"
          operations:
            - { method: GET, name: list, description: "List tasks", call: "engagement-tasks.list-tasks", outputParameters: [{ type: object, mapping: "$." }] }
    - type: mcp
      port: 9113
      namespace: engagement-tasks-mcp
      transport: http
      tools:
        - name: list-tasks
          description: "List all task engagements"
          hints: { readOnly: true, idempotent: true }
          call: "engagement-tasks.list-tasks"
          with: { limit: "tools.limit", after: "tools.after" }
          outputParameters: [{ type: object, mapping: "$." }]
        - name: get-task
          description: "Get a task by ID"
          hints: { readOnly: true, idempotent: true }
          call: "engagement-tasks.get-task"
          with: { taskId: "tools.taskId" }
          outputParameters: [{ type: object, mapping: "$." }]
        - name: create-task
          description: "Create a new task"
          hints: { readOnly: false }
          call: "engagement-tasks.create-task"
          with: { properties: "tools.properties" }
          outputParameters: [{ type: object, mapping: "$." }]
