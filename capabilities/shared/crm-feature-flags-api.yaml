naftiko: 1.0.0-alpha1
info:
  label: HubSpot CRM Feature Flags API
  description: "The HubSpot CRM Feature Flags API allows you to manage feature flags for your HubSpot applications.\n\n## Overview\nFeature flags enable you to control feature rollouts at both the application
    and portal"
  tags:
  - HubSpot
  - API
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: crm-feature-flags-api
    baseUri: https://api.hubapi.com
    description: "The HubSpot CRM Feature Flags API allows you to manage feature flags for your HubSpot applications.\n\n## Overview\nFeature flags enable you to control feature rollouts at both the application
      and portal"
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: flags
      path: /flags
      description: flags operations
      operations:
      - name: getapplicationfeatureflag
        method: GET
        description: HubSpot Retrieve a Feature Flag Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: upsertapplicationfeatureflag
        method: PUT
        description: HubSpot Create or Update a Feature Flag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteapplicationfeatureflag
        method: DELETE
        description: HubSpot Delete a Feature Flag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: portals
      path: /portals
      description: portals operations
      operations:
      - name: listportalflagstates
        method: GET
        description: HubSpot List Portal Flag States
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getportalflagstate
        method: GET
        description: HubSpot Retrieve a Portal Flag State
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: setportalflagstate
        method: PUT
        description: HubSpot Set a Portal Flag State
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteportalflagstate
        method: DELETE
        description: HubSpot Delete a Portal Flag State
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: upsert
      path: /upsert
      description: upsert operations
      operations:
      - name: batchupsertportalflagstates
        method: POST
        description: HubSpot Batch Create or Update Portal Flag States
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: delete
      path: /delete
      description: delete operations
      operations:
      - name: batchdeleteportalflagstates
        method: POST
        description: HubSpot Batch Delete Portal Flag States
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    port: 9112
    namespace: crm-feature-flags-api-mcp
    transport: http
    tools:
    - name: getapplicationfeatureflag
      description: HubSpot Retrieve a Feature Flag Configuration
      hints:
        readOnly: true
      call: crm-feature-flags-api.getapplicationfeatureflag
    - name: upsertapplicationfeatureflag
      description: HubSpot Create or Update a Feature Flag
      hints:
        readOnly: false
      call: crm-feature-flags-api.upsertapplicationfeatureflag
    - name: deleteapplicationfeatureflag
      description: HubSpot Delete a Feature Flag
      hints:
        destructive: true
      call: crm-feature-flags-api.deleteapplicationfeatureflag
    - name: listportalflagstates
      description: HubSpot List Portal Flag States
      hints:
        readOnly: true
      call: crm-feature-flags-api.listportalflagstates
    - name: getportalflagstate
      description: HubSpot Retrieve a Portal Flag State
      hints:
        readOnly: true
      call: crm-feature-flags-api.getportalflagstate
    - name: setportalflagstate
      description: HubSpot Set a Portal Flag State
      hints:
        readOnly: false
      call: crm-feature-flags-api.setportalflagstate
    - name: deleteportalflagstate
      description: HubSpot Delete a Portal Flag State
      hints:
        destructive: true
      call: crm-feature-flags-api.deleteportalflagstate
    - name: batchupsertportalflagstates
      description: HubSpot Batch Create or Update Portal Flag States
      hints:
        readOnly: false
      call: crm-feature-flags-api.batchupsertportalflagstates
    - name: batchdeleteportalflagstates
      description: HubSpot Batch Delete Portal Flag States
      hints:
        readOnly: false
      call: crm-feature-flags-api.batchdeleteportalflagstates
