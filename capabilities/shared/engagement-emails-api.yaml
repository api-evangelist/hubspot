naftiko: 1.0.0-alpha1
info:
  label: HubSpot Engagement Emails API
  description: 'The emails engagement API allows you to log and manage email activity records on CRM records in HubSpot. You can create email engagement records to track sent emails, associate them with
    contacts and '
  tags:
  - HubSpot
  - API
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: engagement-emails-api
    baseUri: https://api.hubapi.com
    description: 'The emails engagement API allows you to log and manage email activity records on CRM records in HubSpot. You can create email engagement records to track sent emails, associate them with
      contacts and '
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: emails
      path: /emails
      description: emails operations
      operations:
      - name: listemailengagements
        method: GET
        description: HubSpot List Email Engagements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createemailengagement
        method: POST
        description: HubSpot Create an Email Engagement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getemailengagement
        method: GET
        description: HubSpot Get an Email Engagement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateemailengagement
        method: PATCH
        description: HubSpot Update an Email Engagement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteemailengagement
        method: DELETE
        description: HubSpot Archive an Email Engagement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: read
      path: /read
      description: read operations
      operations:
      - name: batchreademailengagements
        method: POST
        description: HubSpot Batch Read Email Engagements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: create
      path: /create
      description: create operations
      operations:
      - name: batchcreateemailengagements
        method: POST
        description: HubSpot Batch Create Email Engagements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: update
      path: /update
      description: update operations
      operations:
      - name: batchupdateemailengagements
        method: POST
        description: HubSpot Batch Update Email Engagements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /search
      description: search operations
      operations:
      - name: searchemailengagements
        method: POST
        description: HubSpot Search Email Engagements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: associations
      path: /associations
      description: associations operations
      operations:
      - name: listemailengagementassociations
        method: GET
        description: HubSpot List Email Engagement Associations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: '{toObjectId}'
      path: /{toObjectId}
      description: '{toObjectId} operations'
      operations:
      - name: createemailengagementassociation
        method: PUT
        description: HubSpot Create an Email Engagement Association
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteemailengagementassociation
        method: DELETE
        description: HubSpot Delete an Email Engagement Association
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    port: 9119
    namespace: engagement-emails-api-mcp
    transport: http
    tools:
    - name: listemailengagements
      description: HubSpot List Email Engagements
      hints:
        readOnly: true
      call: engagement-emails-api.listemailengagements
    - name: createemailengagement
      description: HubSpot Create an Email Engagement
      hints:
        readOnly: false
      call: engagement-emails-api.createemailengagement
    - name: getemailengagement
      description: HubSpot Get an Email Engagement
      hints:
        readOnly: true
      call: engagement-emails-api.getemailengagement
    - name: updateemailengagement
      description: HubSpot Update an Email Engagement
      hints:
        readOnly: false
      call: engagement-emails-api.updateemailengagement
    - name: deleteemailengagement
      description: HubSpot Archive an Email Engagement
      hints:
        destructive: true
      call: engagement-emails-api.deleteemailengagement
    - name: batchreademailengagements
      description: HubSpot Batch Read Email Engagements
      hints:
        readOnly: false
      call: engagement-emails-api.batchreademailengagements
    - name: batchcreateemailengagements
      description: HubSpot Batch Create Email Engagements
      hints:
        readOnly: false
      call: engagement-emails-api.batchcreateemailengagements
    - name: batchupdateemailengagements
      description: HubSpot Batch Update Email Engagements
      hints:
        readOnly: false
      call: engagement-emails-api.batchupdateemailengagements
    - name: searchemailengagements
      description: HubSpot Search Email Engagements
      hints:
        readOnly: false
      call: engagement-emails-api.searchemailengagements
    - name: listemailengagementassociations
      description: HubSpot List Email Engagement Associations
      hints:
        readOnly: true
      call: engagement-emails-api.listemailengagementassociations
    - name: createemailengagementassociation
      description: HubSpot Create an Email Engagement Association
      hints:
        readOnly: false
      call: engagement-emails-api.createemailengagementassociation
    - name: deleteemailengagementassociation
      description: HubSpot Delete an Email Engagement Association
      hints:
        destructive: true
      call: engagement-emails-api.deleteemailengagementassociation
