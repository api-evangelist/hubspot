naftiko: "1.0.0-alpha1"

info:
  label: "HubSpot Blog Authors"
  description: "Manage blog author profiles including CRUD, batch operations, and multi-language support."
  tags:
    - HubSpot
    - CMS
    - Blog
    - Authors
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: blog-authors
      baseUri: https://api.hubapi.com
      description: "HubSpot Blog Authors API for managing blog author profiles."
      authentication:
        type: bearer
        token: "{{HUBSPOT_ACCESS_TOKEN}}"
      resources:
        - name: authors
          path: /cms/v3/blogs/authors
          description: "Blog author profiles"
          operations:
            - name: list-blog-authors
              method: GET
              description: "List all blog authors"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results per page"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: archived
                  in: query
                  type: boolean
                  required: false
                  description: "Whether to return archived authors"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-blog-author
              method: POST
              description: "Create a new blog author"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  slug: "{{tools.slug}}"
                  email: "{{tools.email}}"
                  bio: "{{tools.bio}}"
        - name: author-by-id
          path: /cms/v3/blogs/authors/{objectId}
          description: "Individual blog author operations"
          operations:
            - name: get-blog-author
              method: GET
              description: "Retrieve a blog author by ID"
              inputParameters:
                - name: objectId
                  in: path
                  type: string
                  required: true
                  description: "The blog author ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-blog-author
              method: PATCH
              description: "Update a blog author"
              inputParameters:
                - name: objectId
                  in: path
                  type: string
                  required: true
                  description: "The blog author ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  bio: "{{tools.bio}}"
            - name: archive-blog-author
              method: DELETE
              description: "Archive a blog author"
              inputParameters:
                - name: objectId
                  in: path
                  type: string
                  required: true
                  description: "The blog author ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: batch-read
          path: /cms/v3/blogs/authors/batch/read
          description: "Batch read blog authors"
          operations:
            - name: batch-read-blog-authors
              method: POST
              description: "Read multiple blog authors by IDs"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
        - name: batch-create
          path: /cms/v3/blogs/authors/batch/create
          description: "Batch create blog authors"
          operations:
            - name: batch-create-blog-authors
              method: POST
              description: "Create multiple blog authors"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
        - name: batch-archive
          path: /cms/v3/blogs/authors/batch/archive
          description: "Batch archive blog authors"
          operations:
            - name: batch-archive-blog-authors
              method: POST
              description: "Archive multiple blog authors"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"

  exposes:
    - type: rest
      port: 8101
      namespace: blog-authors-api
      resources:
        - path: /v1/blog-authors
          name: blog-authors
          description: "Blog author profiles"
          operations:
            - method: GET
              name: list-authors
              description: "List all blog authors"
              call: "blog-authors.list-blog-authors"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-author
              description: "Create a blog author"
              call: "blog-authors.create-blog-author"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/blog-authors/{objectId}
          name: blog-author-by-id
          description: "Individual blog author"
          operations:
            - method: GET
              name: get-author
              description: "Retrieve a blog author"
              call: "blog-authors.get-blog-author"
              with:
                objectId: "rest.objectId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-author
              description: "Update a blog author"
              call: "blog-authors.update-blog-author"
              with:
                objectId: "rest.objectId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: archive-author
              description: "Archive a blog author"
              call: "blog-authors.archive-blog-author"
              with:
                objectId: "rest.objectId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: blog-authors-mcp
      transport: http
      tools:
        - name: list-blog-authors
          description: "List all blog authors in HubSpot"
          hints:
            readOnly: true
            idempotent: true
          call: "blog-authors.list-blog-authors"
          with:
            limit: "tools.limit"
            after: "tools.after"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-blog-author
          description: "Retrieve a specific blog author by ID"
          hints:
            readOnly: true
            idempotent: true
          call: "blog-authors.get-blog-author"
          with:
            objectId: "tools.objectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-blog-author
          description: "Create a new blog author profile"
          hints:
            readOnly: false
          call: "blog-authors.create-blog-author"
          with:
            name: "tools.name"
            slug: "tools.slug"
            email: "tools.email"
            bio: "tools.bio"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-blog-author
          description: "Update an existing blog author profile"
          hints:
            readOnly: false
            idempotent: true
          call: "blog-authors.update-blog-author"
          with:
            objectId: "tools.objectId"
            name: "tools.name"
            bio: "tools.bio"
          outputParameters:
            - type: object
              mapping: "$."
        - name: archive-blog-author
          description: "Archive a blog author"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "blog-authors.archive-blog-author"
          with:
            objectId: "tools.objectId"
          outputParameters:
            - type: object
              mapping: "$."
