naftiko: 1.0.0-alpha1
info:
  label: HubSpot CMS Domains API
  description: "The HubSpot CMS Domains API allows you to retrieve information about domains connected to a HubSpot CMS site.\n\nUse this API to:\n- List all domains connected to your HubSpot account\n\
    - Get detailed info"
  tags:
  - HubSpot
  - API
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: domains-api
    baseUri: https://api.hubapi.com
    description: "The HubSpot CMS Domains API allows you to retrieve information about domains connected to a HubSpot CMS site.\n\nUse this API to:\n- List all domains connected to your HubSpot account\n\
      - Get detailed info"
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: domains
      path: /domains
      description: domains operations
      operations:
      - name: listdomains
        method: GET
        description: HubSpot List All Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getdomainbyid
        method: GET
        description: HubSpot Get a Domain by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    port: 9117
    namespace: domains-api-mcp
    transport: http
    tools:
    - name: listdomains
      description: HubSpot List All Domains
      hints:
        readOnly: true
      call: domains-api.listdomains
    - name: getdomainbyid
      description: HubSpot Get a Domain by ID
      hints:
        readOnly: true
      call: domains-api.getdomainbyid
