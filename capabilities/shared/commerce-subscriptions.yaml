naftiko: "1.0.0-alpha1"
info:
  label: "HubSpot Commerce Subscriptions"
  description: "Manage recurring subscription records in HubSpot Commerce."
  tags:
    - HubSpot
    - Commerce
    - Subscriptions
  created: "2026-04-18"
  modified: "2026-04-18"
binds:
  - namespace: env
    keys:
      HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
    - type: http
      namespace: commerce-subscriptions
      baseUri: https://api.hubapi.com
      description: "HubSpot Commerce Subscriptions API."
      authentication:
        type: bearer
        token: "{{HUBSPOT_ACCESS_TOKEN}}"
      resources:
        - name: subscriptions
          path: /crm/v3/objects/subscriptions
          description: "Subscription records"
          operations:
            - name: list-subscriptions
              method: GET
              description: "List all subscriptions"
              inputParameters:
                - { name: limit, in: query, type: integer, required: false, description: "Max results" }
                - { name: after, in: query, type: string, required: false, description: "Cursor" }
                - { name: properties, in: query, type: string, required: false, description: "Properties" }
              outputRawFormat: json
              outputParameters: [{ name: result, type: object, value: "$." }]
            - name: create-subscription
              method: POST
              description: "Create a subscription"
              outputRawFormat: json
              outputParameters: [{ name: result, type: object, value: "$." }]
              body: { type: json, data: { properties: "{{tools.properties}}" } }
        - name: subscription-by-id
          path: /crm/v3/objects/subscriptions/{subscriptionId}
          description: "Individual subscription"
          operations:
            - name: get-subscription
              method: GET
              description: "Get a subscription"
              inputParameters:
                - { name: subscriptionId, in: path, type: string, required: true, description: "Subscription ID" }
              outputRawFormat: json
              outputParameters: [{ name: result, type: object, value: "$." }]
            - name: update-subscription
              method: PATCH
              description: "Update a subscription"
              inputParameters:
                - { name: subscriptionId, in: path, type: string, required: true, description: "Subscription ID" }
              outputRawFormat: json
              outputParameters: [{ name: result, type: object, value: "$." }]
              body: { type: json, data: { properties: "{{tools.properties}}" } }
            - name: archive-subscription
              method: DELETE
              description: "Archive a subscription"
              inputParameters:
                - { name: subscriptionId, in: path, type: string, required: true, description: "Subscription ID" }
              outputRawFormat: json
              outputParameters: [{ name: result, type: object, value: "$." }]
        - name: search
          path: /crm/v3/objects/subscriptions/search
          description: "Search subscriptions"
          operations:
            - name: search-subscriptions
              method: POST
              description: "Search subscriptions"
              outputRawFormat: json
              outputParameters: [{ name: result, type: object, value: "$." }]
              body: { type: json, data: { filterGroups: "{{tools.filterGroups}}", query: "{{tools.query}}" } }
  exposes:
    - type: rest
      port: 8108
      namespace: commerce-subscriptions-api
      resources:
        - path: /v1/subscriptions
          name: subscriptions
          description: "Subscription records"
          operations:
            - { method: GET, name: list, description: "List subscriptions", call: "commerce-subscriptions.list-subscriptions", outputParameters: [{ type: object, mapping: "$." }] }
    - type: mcp
      port: 9108
      namespace: commerce-subscriptions-mcp
      transport: http
      tools:
        - { name: list-subscriptions, description: "List all subscriptions", hints: { readOnly: true, idempotent: true }, call: "commerce-subscriptions.list-subscriptions", with: { limit: "tools.limit", after: "tools.after" }, outputParameters: [{ type: object, mapping: "$." }] }
        - { name: get-subscription, description: "Get a subscription by ID", hints: { readOnly: true, idempotent: true }, call: "commerce-subscriptions.get-subscription", with: { subscriptionId: "tools.subscriptionId" }, outputParameters: [{ type: object, mapping: "$." }] }
        - { name: search-subscriptions, description: "Search subscriptions", hints: { readOnly: true, idempotent: true }, call: "commerce-subscriptions.search-subscriptions", with: { filterGroups: "tools.filterGroups", query: "tools.query" }, outputParameters: [{ type: object, mapping: "$." }] }
