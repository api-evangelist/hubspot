naftiko: "1.0.0-alpha1"

info:
  label: "HubSpot Engagement Calls"
  description: "Manage call engagement records for logging and tracking phone calls in HubSpot CRM."
  tags:
    - HubSpot
    - CRM
    - Engagements
    - Calls
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: engagement-calls
      baseUri: https://api.hubapi.com
      description: "HubSpot Engagement Calls API for managing call records."
      authentication:
        type: bearer
        token: "{{HUBSPOT_ACCESS_TOKEN}}"
      resources:
        - name: calls
          path: /crm/v3/objects/calls
          description: "Call engagement records"
          operations:
            - name: list-calls
              method: GET
              description: "List all calls"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results per page"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: properties
                  in: query
                  type: string
                  required: false
                  description: "Properties to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-call
              method: POST
              description: "Create a call record"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  properties: "{{tools.properties}}"
        - name: call-by-id
          path: /crm/v3/objects/calls/{callId}
          description: "Individual call"
          operations:
            - name: get-call
              method: GET
              description: "Get a call by ID"
              inputParameters:
                - name: callId
                  in: path
                  type: string
                  required: true
                  description: "Call ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-call
              method: PATCH
              description: "Update a call"
              inputParameters:
                - name: callId
                  in: path
                  type: string
                  required: true
                  description: "Call ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  properties: "{{tools.properties}}"
            - name: archive-call
              method: DELETE
              description: "Archive a call"
              inputParameters:
                - name: callId
                  in: path
                  type: string
                  required: true
                  description: "Call ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: search
          path: /crm/v3/objects/calls/search
          description: "Search calls"
          operations:
            - name: search-calls
              method: POST
              description: "Search calls with filters"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  filterGroups: "{{tools.filterGroups}}"
                  query: "{{tools.query}}"

  exposes:
    - type: rest
      port: 8109
      namespace: engagement-calls-api
      resources:
        - path: /v1/calls
          name: calls
          description: "Call records"
          operations:
            - method: GET
              name: list
              description: "List calls"
              call: "engagement-calls.list-calls"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9109
      namespace: engagement-calls-mcp
      transport: http
      tools:
        - name: list-calls
          description: "List all call engagements"
          hints:
            readOnly: true
            idempotent: true
          call: "engagement-calls.list-calls"
          with:
            limit: "tools.limit"
            after: "tools.after"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-call
          description: "Get a call by ID"
          hints:
            readOnly: true
            idempotent: true
          call: "engagement-calls.get-call"
          with:
            callId: "tools.callId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-call
          description: "Log a new call engagement"
          hints:
            readOnly: false
          call: "engagement-calls.create-call"
          with:
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-call
          description: "Update a call record"
          hints:
            readOnly: false
            idempotent: true
          call: "engagement-calls.update-call"
          with:
            callId: "tools.callId"
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
