naftiko: "1.0.0-alpha1"

info:
  label: "HubSpot Engagement Meetings"
  description: "Manage meeting engagement records for scheduling and tracking meetings in HubSpot CRM."
  tags:
    - HubSpot
    - CRM
    - Engagements
    - Meetings
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: engagement-meetings
      baseUri: https://api.hubapi.com
      description: "HubSpot Engagement Meetings API for managing meeting records."
      authentication:
        type: bearer
        token: "{{HUBSPOT_ACCESS_TOKEN}}"
      resources:
        - name: meetings
          path: /crm/v3/objects/meetings
          description: "Meeting engagement records"
          operations:
            - name: list-meetings
              method: GET
              description: "List all meetings"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results per page"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: properties
                  in: query
                  type: string
                  required: false
                  description: "Properties to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-meeting
              method: POST
              description: "Create a meeting"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  properties: "{{tools.properties}}"
        - name: meeting-by-id
          path: /crm/v3/objects/meetings/{meetingId}
          description: "Individual meeting"
          operations:
            - name: get-meeting
              method: GET
              description: "Get a meeting by ID"
              inputParameters:
                - name: meetingId
                  in: path
                  type: string
                  required: true
                  description: "Meeting ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-meeting
              method: PATCH
              description: "Update a meeting"
              inputParameters:
                - name: meetingId
                  in: path
                  type: string
                  required: true
                  description: "Meeting ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  properties: "{{tools.properties}}"
            - name: archive-meeting
              method: DELETE
              description: "Archive a meeting"
              inputParameters:
                - name: meetingId
                  in: path
                  type: string
                  required: true
                  description: "Meeting ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8111
      namespace: engagement-meetings-api
      resources:
        - path: /v1/meetings
          name: meetings
          description: "Meeting records"
          operations:
            - method: GET
              name: list
              description: "List meetings"
              call: "engagement-meetings.list-meetings"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9111
      namespace: engagement-meetings-mcp
      transport: http
      tools:
        - name: list-meetings
          description: "List all meeting engagements"
          hints:
            readOnly: true
            idempotent: true
          call: "engagement-meetings.list-meetings"
          with:
            limit: "tools.limit"
            after: "tools.after"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-meeting
          description: "Get a meeting by ID"
          hints:
            readOnly: true
            idempotent: true
          call: "engagement-meetings.get-meeting"
          with:
            meetingId: "tools.meetingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-meeting
          description: "Create a new meeting engagement"
          hints:
            readOnly: false
          call: "engagement-meetings.create-meeting"
          with:
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
