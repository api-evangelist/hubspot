naftiko: 1.0.0-alpha1
info:
  label: HubSpot OAuth API
  description: "The HubSpot OAuth API enables secure authentication and authorization for accessing HubSpot resources.\nUse these endpoints to manage OAuth tokens, refresh access tokens, and retrieve token
    metadata fo"
  tags:
  - HubSpot
  - API
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: oauth-api
    baseUri: https://api.hubapi.com
    description: "The HubSpot OAuth API enables secure authentication and authorization for accessing HubSpot resources.\nUse these endpoints to manage OAuth tokens, refresh access tokens, and retrieve
      token metadata fo"
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: access-tokens
      path: /access-tokens
      description: access-tokens operations
      operations:
      - name: getaccesstokenmetadata
        method: GET
        description: HubSpot Retrieve Access Token Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: refresh-tokens
      path: /refresh-tokens
      description: refresh-tokens operations
      operations:
      - name: getrefreshtokenmetadata
        method: GET
        description: HubSpot Retrieve Refresh Token Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: revokerefreshtoken
        method: DELETE
        description: HubSpot Revoke a Refresh Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: token
      path: /token
      description: token operations
      operations:
      - name: createorrefreshaccesstoken
        method: POST
        description: HubSpot Create or Refresh an Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    port: 9124
    namespace: oauth-api-mcp
    transport: http
    tools:
    - name: getaccesstokenmetadata
      description: HubSpot Retrieve Access Token Metadata
      hints:
        readOnly: true
      call: oauth-api.getaccesstokenmetadata
    - name: getrefreshtokenmetadata
      description: HubSpot Retrieve Refresh Token Metadata
      hints:
        readOnly: true
      call: oauth-api.getrefreshtokenmetadata
    - name: revokerefreshtoken
      description: HubSpot Revoke a Refresh Token
      hints:
        destructive: true
      call: oauth-api.revokerefreshtoken
    - name: createorrefreshaccesstoken
      description: HubSpot Create or Refresh an Access Token
      hints:
        readOnly: false
      call: oauth-api.createorrefreshaccesstoken
