naftiko: "1.0.0-alpha1"

info:
  label: "HubSpot CRM Search"
  description: "Search across all CRM object types using flexible filters, sorts, and pagination."
  tags:
    - HubSpot
    - CRM
    - Search
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: crm-search
      baseUri: https://api.hubapi.com
      description: "HubSpot CRM Search API for querying CRM objects."
      authentication:
        type: bearer
        token: "{{HUBSPOT_ACCESS_TOKEN}}"
      resources:
        - name: search
          path: /crm/v3/objects/{objectType}/search
          description: "CRM object search"
          operations:
            - name: search-objects
              method: POST
              description: "Search CRM objects of a specified type"
              inputParameters:
                - name: objectType
                  in: path
                  type: string
                  required: true
                  description: "Object type to search (contacts, companies, deals, tickets)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  filterGroups: "{{tools.filterGroups}}"
                  sorts: "{{tools.sorts}}"
                  query: "{{tools.query}}"
                  properties: "{{tools.properties}}"
                  limit: "{{tools.limit}}"
                  after: "{{tools.after}}"

  exposes:
    - type: rest
      port: 8117
      namespace: crm-search-api
      resources:
        - path: /v1/search/{objectType}
          name: search
          description: "CRM object search"
          operations:
            - method: POST
              name: search
              description: "Search CRM objects"
              call: "crm-search.search-objects"
              with:
                objectType: "rest.objectType"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9117
      namespace: crm-search-mcp
      transport: http
      tools:
        - name: search-crm-objects
          description: "Search CRM objects by type with filters and queries"
          hints:
            readOnly: true
            idempotent: true
          call: "crm-search.search-objects"
          with:
            objectType: "tools.objectType"
            filterGroups: "tools.filterGroups"
            query: "tools.query"
            properties: "tools.properties"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
