naftiko: 1.0.0-alpha1
info:
  label: HubSpot Conversations API
  description: "The HubSpot Conversations API enables you to manage conversation threads, \nmessages, and inboxes programmatically. Use this API to query existing \nconversations, send messages, manage
    thread assignmen"
  tags:
  - HubSpot
  - API
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: conversations-api
    baseUri: https://api.hubapi.com
    description: "The HubSpot Conversations API enables you to manage conversation threads, \nmessages, and inboxes programmatically. Use this API to query existing \nconversations, send messages, manage
      thread assignmen"
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: inboxes
      path: /inboxes
      description: inboxes operations
      operations:
      - name: listinboxes
        method: GET
        description: HubSpot List All Inboxes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getinboxbyid
        method: GET
        description: HubSpot Retrieve an Inbox
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: threads
      path: /threads
      description: threads operations
      operations:
      - name: listthreads
        method: GET
        description: HubSpot List Conversation Threads
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getthreadbyid
        method: GET
        description: HubSpot Retrieve a Thread
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatethread
        method: PATCH
        description: HubSpot Update a Thread
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: archivethread
        method: DELETE
        description: HubSpot Archive a Thread
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: messages
      path: /messages
      description: messages operations
      operations:
      - name: listthreadmessages
        method: GET
        description: HubSpot List Thread Messages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: sendmessage
        method: POST
        description: HubSpot Send a Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getmessagebyid
        method: GET
        description: HubSpot Retrieve a Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: channels
      path: /channels
      description: channels operations
      operations:
      - name: listchannels
        method: GET
        description: HubSpot List Channels
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: actors
      path: /actors
      description: actors operations
      operations:
      - name: listactors
        method: GET
        description: HubSpot List Actors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getactorbyid
        method: GET
        description: HubSpot Retrieve an Actor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    port: 9107
    namespace: conversations-api-mcp
    transport: http
    tools:
    - name: listinboxes
      description: HubSpot List All Inboxes
      hints:
        readOnly: true
      call: conversations-api.listinboxes
    - name: getinboxbyid
      description: HubSpot Retrieve an Inbox
      hints:
        readOnly: true
      call: conversations-api.getinboxbyid
    - name: listthreads
      description: HubSpot List Conversation Threads
      hints:
        readOnly: true
      call: conversations-api.listthreads
    - name: getthreadbyid
      description: HubSpot Retrieve a Thread
      hints:
        readOnly: true
      call: conversations-api.getthreadbyid
    - name: updatethread
      description: HubSpot Update a Thread
      hints:
        readOnly: false
      call: conversations-api.updatethread
    - name: archivethread
      description: HubSpot Archive a Thread
      hints:
        destructive: true
      call: conversations-api.archivethread
    - name: listthreadmessages
      description: HubSpot List Thread Messages
      hints:
        readOnly: true
      call: conversations-api.listthreadmessages
    - name: sendmessage
      description: HubSpot Send a Message
      hints:
        readOnly: false
      call: conversations-api.sendmessage
    - name: getmessagebyid
      description: HubSpot Retrieve a Message
      hints:
        readOnly: true
      call: conversations-api.getmessagebyid
    - name: listchannels
      description: HubSpot List Channels
      hints:
        readOnly: true
      call: conversations-api.listchannels
    - name: listactors
      description: HubSpot List Actors
      hints:
        readOnly: true
      call: conversations-api.listactors
    - name: getactorbyid
      description: HubSpot Retrieve an Actor
      hints:
        readOnly: true
      call: conversations-api.getactorbyid
