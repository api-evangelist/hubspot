naftiko: "1.0.0-alpha1"

info:
  label: "HubSpot CRM Companies"
  description: "Manage company records storing data about businesses and organizations in HubSpot CRM."
  tags:
    - HubSpot
    - CRM
    - Companies
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: crm-companies
      baseUri: https://api.hubapi.com
      description: "HubSpot CRM Companies API for managing company records."
      authentication:
        type: bearer
        token: "{{HUBSPOT_ACCESS_TOKEN}}"
      resources:
        - name: companies
          path: /crm/v3/objects/companies
          description: "Company records"
          operations:
            - name: list-companies
              method: GET
              description: "List all companies"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results per page"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: properties
                  in: query
                  type: string
                  required: false
                  description: "Properties to return"
                - name: archived
                  in: query
                  type: boolean
                  required: false
                  description: "Return archived companies"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-company
              method: POST
              description: "Create a company"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  properties: "{{tools.properties}}"
        - name: company-by-id
          path: /crm/v3/objects/companies/{companyId}
          description: "Individual company"
          operations:
            - name: get-company
              method: GET
              description: "Get a company by ID"
              inputParameters:
                - name: companyId
                  in: path
                  type: string
                  required: true
                  description: "Company ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-company
              method: PATCH
              description: "Update a company"
              inputParameters:
                - name: companyId
                  in: path
                  type: string
                  required: true
                  description: "Company ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  properties: "{{tools.properties}}"
            - name: archive-company
              method: DELETE
              description: "Archive a company"
              inputParameters:
                - name: companyId
                  in: path
                  type: string
                  required: true
                  description: "Company ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: search
          path: /crm/v3/objects/companies/search
          description: "Search companies"
          operations:
            - name: search-companies
              method: POST
              description: "Search companies with filters"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  filterGroups: "{{tools.filterGroups}}"
                  query: "{{tools.query}}"
                  limit: "{{tools.limit}}"
                  properties: "{{tools.properties}}"
        - name: batch-read
          path: /crm/v3/objects/companies/batch/read
          description: "Batch read companies"
          operations:
            - name: batch-read-companies
              method: POST
              description: "Read multiple companies"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  inputs: "{{tools.inputs}}"
                  properties: "{{tools.properties}}"

  exposes:
    - type: rest
      port: 8104
      namespace: crm-companies-api
      resources:
        - path: /v1/companies
          name: companies
          description: "Company records"
          operations:
            - method: GET
              name: list
              description: "List companies"
              call: "crm-companies.list-companies"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create
              description: "Create company"
              call: "crm-companies.create-company"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/companies/{companyId}
          name: company-by-id
          description: "Individual company"
          operations:
            - method: GET
              name: get
              description: "Get company"
              call: "crm-companies.get-company"
              with:
                companyId: "rest.companyId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update
              description: "Update company"
              call: "crm-companies.update-company"
              with:
                companyId: "rest.companyId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: archive
              description: "Archive company"
              call: "crm-companies.archive-company"
              with:
                companyId: "rest.companyId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: crm-companies-mcp
      transport: http
      tools:
        - name: list-companies
          description: "List all companies in HubSpot CRM"
          hints:
            readOnly: true
            idempotent: true
          call: "crm-companies.list-companies"
          with:
            limit: "tools.limit"
            after: "tools.after"
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-company
          description: "Retrieve a company by ID"
          hints:
            readOnly: true
            idempotent: true
          call: "crm-companies.get-company"
          with:
            companyId: "tools.companyId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-company
          description: "Create a new company"
          hints:
            readOnly: false
          call: "crm-companies.create-company"
          with:
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-company
          description: "Update an existing company"
          hints:
            readOnly: false
            idempotent: true
          call: "crm-companies.update-company"
          with:
            companyId: "tools.companyId"
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
        - name: archive-company
          description: "Archive a company"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "crm-companies.archive-company"
          with:
            companyId: "tools.companyId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-companies
          description: "Search companies using filters"
          hints:
            readOnly: true
            idempotent: true
          call: "crm-companies.search-companies"
          with:
            filterGroups: "tools.filterGroups"
            query: "tools.query"
            limit: "tools.limit"
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
