naftiko: "1.0.0-alpha1"

info:
  label: "HubSpot Blog Posts"
  description: "Manage blog posts including CRUD, publishing, scheduling, drafts, revisions, cloning, and multi-language support."
  tags:
    - HubSpot
    - CMS
    - Blog
    - Content
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: blog-posts
      baseUri: https://api.hubapi.com
      description: "HubSpot Blog Posts API for creating, publishing, and managing blog content."
      authentication:
        type: bearer
        token: "{{HUBSPOT_ACCESS_TOKEN}}"
      resources:
        - name: posts
          path: /cms/v3/blogs/posts
          description: "Blog post management"
          operations:
            - name: list-blog-posts
              method: GET
              description: "List all blog posts"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results per page"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: archived
                  in: query
                  type: boolean
                  required: false
                  description: "Whether to return archived posts"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-blog-post
              method: POST
              description: "Create a new blog post"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  contentGroupId: "{{tools.contentGroupId}}"
                  postBody: "{{tools.postBody}}"
        - name: post-by-id
          path: /cms/v3/blogs/posts/{objectId}
          description: "Individual blog post operations"
          operations:
            - name: get-blog-post
              method: GET
              description: "Retrieve a blog post by ID"
              inputParameters:
                - name: objectId
                  in: path
                  type: string
                  required: true
                  description: "The blog post ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-blog-post
              method: PATCH
              description: "Update a blog post"
              inputParameters:
                - name: objectId
                  in: path
                  type: string
                  required: true
                  description: "The blog post ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  postBody: "{{tools.postBody}}"
            - name: archive-blog-post
              method: DELETE
              description: "Archive a blog post"
              inputParameters:
                - name: objectId
                  in: path
                  type: string
                  required: true
                  description: "The blog post ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: schedule
          path: /cms/v3/blogs/posts/schedule
          description: "Blog post scheduling"
          operations:
            - name: schedule-blog-post
              method: POST
              description: "Schedule a blog post for publication"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  id: "{{tools.id}}"
                  publishDate: "{{tools.publishDate}}"
        - name: clone
          path: /cms/v3/blogs/posts/clone
          description: "Blog post cloning"
          operations:
            - name: clone-blog-post
              method: POST
              description: "Clone a blog post"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  id: "{{tools.id}}"
        - name: push-live
          path: /cms/v3/blogs/posts/{objectId}/draft/push-live
          description: "Push draft to live"
          operations:
            - name: push-blog-post-live
              method: POST
              description: "Push draft to live version"
              inputParameters:
                - name: objectId
                  in: path
                  type: string
                  required: true
                  description: "The blog post ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: revisions
          path: /cms/v3/blogs/posts/{objectId}/revisions
          description: "Blog post revision history"
          operations:
            - name: get-blog-post-revisions
              method: GET
              description: "Get revision history for a blog post"
              inputParameters:
                - name: objectId
                  in: path
                  type: string
                  required: true
                  description: "The blog post ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: blog-posts-api
      resources:
        - path: /v1/blog-posts
          name: blog-posts
          description: "Blog posts"
          operations:
            - method: GET
              name: list-posts
              description: "List all blog posts"
              call: "blog-posts.list-blog-posts"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-post
              description: "Create a blog post"
              call: "blog-posts.create-blog-post"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/blog-posts/{objectId}
          name: blog-post-by-id
          description: "Individual blog post"
          operations:
            - method: GET
              name: get-post
              description: "Get a blog post"
              call: "blog-posts.get-blog-post"
              with:
                objectId: "rest.objectId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-post
              description: "Update a blog post"
              call: "blog-posts.update-blog-post"
              with:
                objectId: "rest.objectId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: archive-post
              description: "Archive a blog post"
              call: "blog-posts.archive-blog-post"
              with:
                objectId: "rest.objectId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: blog-posts-mcp
      transport: http
      tools:
        - name: list-blog-posts
          description: "List all blog posts in HubSpot"
          hints:
            readOnly: true
            idempotent: true
          call: "blog-posts.list-blog-posts"
          with:
            limit: "tools.limit"
            after: "tools.after"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-blog-post
          description: "Retrieve a specific blog post by ID"
          hints:
            readOnly: true
            idempotent: true
          call: "blog-posts.get-blog-post"
          with:
            objectId: "tools.objectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-blog-post
          description: "Create a new blog post"
          hints:
            readOnly: false
          call: "blog-posts.create-blog-post"
          with:
            name: "tools.name"
            contentGroupId: "tools.contentGroupId"
            postBody: "tools.postBody"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-blog-post
          description: "Update an existing blog post"
          hints:
            readOnly: false
            idempotent: true
          call: "blog-posts.update-blog-post"
          with:
            objectId: "tools.objectId"
            name: "tools.name"
            postBody: "tools.postBody"
          outputParameters:
            - type: object
              mapping: "$."
        - name: archive-blog-post
          description: "Archive a blog post"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "blog-posts.archive-blog-post"
          with:
            objectId: "tools.objectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: schedule-blog-post
          description: "Schedule a blog post for publication"
          hints:
            readOnly: false
          call: "blog-posts.schedule-blog-post"
          with:
            id: "tools.id"
            publishDate: "tools.publishDate"
          outputParameters:
            - type: object
              mapping: "$."
        - name: clone-blog-post
          description: "Clone an existing blog post"
          hints:
            readOnly: false
          call: "blog-posts.clone-blog-post"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: push-blog-post-live
          description: "Push draft blog post to live"
          hints:
            readOnly: false
          call: "blog-posts.push-blog-post-live"
          with:
            objectId: "tools.objectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-blog-post-revisions
          description: "Get revision history for a blog post"
          hints:
            readOnly: true
            idempotent: true
          call: "blog-posts.get-blog-post-revisions"
          with:
            objectId: "tools.objectId"
          outputParameters:
            - type: object
              mapping: "$."
