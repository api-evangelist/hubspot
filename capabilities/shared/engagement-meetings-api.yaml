naftiko: 1.0.0-alpha1
info:
  label: HubSpot Engagement Meetings API
  description: The meetings endpoints allow you to log and manage meeting engagement records in HubSpot CRM. You can create meeting records, associate them with contacts and companies, and retrieve 
    meeting details a
  tags:
  - HubSpot
  - API
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: engagement-meetings-api
    baseUri: https://api.hubapi.com
    description: The meetings endpoints allow you to log and manage meeting engagement records in HubSpot CRM. You can create meeting records, associate them with contacts and companies, and retrieve 
      meeting details a
    authentication:
      type: bearer
      token: '{{HUBSPOT_ACCESS_TOKEN}}'
    resources:
    - name: meetings
      path: /meetings
      description: meetings operations
      operations:
      - name: listmeetings
        method: GET
        description: HubSpot List Meetings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createmeeting
        method: POST
        description: HubSpot Create a Meeting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getmeeting
        method: GET
        description: HubSpot Get a Meeting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatemeeting
        method: PATCH
        description: HubSpot Update a Meeting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletemeeting
        method: DELETE
        description: HubSpot Archive a Meeting
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: read
      path: /read
      description: read operations
      operations:
      - name: batchreadmeetings
        method: POST
        description: HubSpot Batch Read Meetings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: create
      path: /create
      description: create operations
      operations:
      - name: batchcreatemeetings
        method: POST
        description: HubSpot Batch Create Meetings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: update
      path: /update
      description: update operations
      operations:
      - name: batchupdatemeetings
        method: POST
        description: HubSpot Batch Update Meetings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /search
      description: search operations
      operations:
      - name: searchmeetings
        method: POST
        description: HubSpot Search Meetings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: associations
      path: /associations
      description: associations operations
      operations:
      - name: listmeetingassociations
        method: GET
        description: HubSpot List Meeting Associations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: '{toObjectId}'
      path: /{toObjectId}
      description: '{toObjectId} operations'
      operations:
      - name: createmeetingassociation
        method: PUT
        description: HubSpot Create a Meeting Association
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletemeetingassociation
        method: DELETE
        description: HubSpot Delete a Meeting Association
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    port: 9120
    namespace: engagement-meetings-api-mcp
    transport: http
    tools:
    - name: listmeetings
      description: HubSpot List Meetings
      hints:
        readOnly: true
      call: engagement-meetings-api.listmeetings
    - name: createmeeting
      description: HubSpot Create a Meeting
      hints:
        readOnly: false
      call: engagement-meetings-api.createmeeting
    - name: getmeeting
      description: HubSpot Get a Meeting
      hints:
        readOnly: true
      call: engagement-meetings-api.getmeeting
    - name: updatemeeting
      description: HubSpot Update a Meeting
      hints:
        readOnly: false
      call: engagement-meetings-api.updatemeeting
    - name: deletemeeting
      description: HubSpot Archive a Meeting
      hints:
        destructive: true
      call: engagement-meetings-api.deletemeeting
    - name: batchreadmeetings
      description: HubSpot Batch Read Meetings
      hints:
        readOnly: false
      call: engagement-meetings-api.batchreadmeetings
    - name: batchcreatemeetings
      description: HubSpot Batch Create Meetings
      hints:
        readOnly: false
      call: engagement-meetings-api.batchcreatemeetings
    - name: batchupdatemeetings
      description: HubSpot Batch Update Meetings
      hints:
        readOnly: false
      call: engagement-meetings-api.batchupdatemeetings
    - name: searchmeetings
      description: HubSpot Search Meetings
      hints:
        readOnly: false
      call: engagement-meetings-api.searchmeetings
    - name: listmeetingassociations
      description: HubSpot List Meeting Associations
      hints:
        readOnly: true
      call: engagement-meetings-api.listmeetingassociations
    - name: createmeetingassociation
      description: HubSpot Create a Meeting Association
      hints:
        readOnly: false
      call: engagement-meetings-api.createmeetingassociation
    - name: deletemeetingassociation
      description: HubSpot Delete a Meeting Association
      hints:
        destructive: true
      call: engagement-meetings-api.deletemeetingassociation
