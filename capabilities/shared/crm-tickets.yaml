naftiko: "1.0.0-alpha1"

info:
  label: "HubSpot CRM Tickets"
  description: "Manage customer support ticket records through support pipelines in HubSpot CRM."
  tags:
    - HubSpot
    - CRM
    - Tickets
    - Support
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: crm-tickets
      baseUri: https://api.hubapi.com
      description: "HubSpot CRM Tickets API for managing support ticket records."
      authentication:
        type: bearer
        token: "{{HUBSPOT_ACCESS_TOKEN}}"
      resources:
        - name: tickets
          path: /crm/v3/objects/tickets
          description: "Ticket records"
          operations:
            - name: list-tickets
              method: GET
              description: "List all tickets"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results per page"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: properties
                  in: query
                  type: string
                  required: false
                  description: "Properties to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-ticket
              method: POST
              description: "Create a ticket"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  properties: "{{tools.properties}}"
        - name: ticket-by-id
          path: /crm/v3/objects/tickets/{ticketId}
          description: "Individual ticket"
          operations:
            - name: get-ticket
              method: GET
              description: "Get a ticket by ID"
              inputParameters:
                - name: ticketId
                  in: path
                  type: string
                  required: true
                  description: "Ticket ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-ticket
              method: PATCH
              description: "Update a ticket"
              inputParameters:
                - name: ticketId
                  in: path
                  type: string
                  required: true
                  description: "Ticket ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  properties: "{{tools.properties}}"
            - name: archive-ticket
              method: DELETE
              description: "Archive a ticket"
              inputParameters:
                - name: ticketId
                  in: path
                  type: string
                  required: true
                  description: "Ticket ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: search
          path: /crm/v3/objects/tickets/search
          description: "Search tickets"
          operations:
            - name: search-tickets
              method: POST
              description: "Search tickets with filters"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  filterGroups: "{{tools.filterGroups}}"
                  query: "{{tools.query}}"
                  limit: "{{tools.limit}}"
                  properties: "{{tools.properties}}"

  exposes:
    - type: rest
      port: 8106
      namespace: crm-tickets-api
      resources:
        - path: /v1/tickets
          name: tickets
          description: "Ticket records"
          operations:
            - method: GET
              name: list
              description: "List tickets"
              call: "crm-tickets.list-tickets"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create
              description: "Create ticket"
              call: "crm-tickets.create-ticket"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tickets/{ticketId}
          name: ticket-by-id
          description: "Individual ticket"
          operations:
            - method: GET
              name: get
              description: "Get ticket"
              call: "crm-tickets.get-ticket"
              with:
                ticketId: "rest.ticketId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9106
      namespace: crm-tickets-mcp
      transport: http
      tools:
        - name: list-tickets
          description: "List all support tickets"
          hints:
            readOnly: true
            idempotent: true
          call: "crm-tickets.list-tickets"
          with:
            limit: "tools.limit"
            after: "tools.after"
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-ticket
          description: "Retrieve a ticket by ID"
          hints:
            readOnly: true
            idempotent: true
          call: "crm-tickets.get-ticket"
          with:
            ticketId: "tools.ticketId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-ticket
          description: "Create a new support ticket"
          hints:
            readOnly: false
          call: "crm-tickets.create-ticket"
          with:
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-ticket
          description: "Update an existing ticket"
          hints:
            readOnly: false
            idempotent: true
          call: "crm-tickets.update-ticket"
          with:
            ticketId: "tools.ticketId"
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
        - name: archive-ticket
          description: "Archive a ticket"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "crm-tickets.archive-ticket"
          with:
            ticketId: "tools.ticketId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-tickets
          description: "Search tickets using filters"
          hints:
            readOnly: true
            idempotent: true
          call: "crm-tickets.search-tickets"
          with:
            filterGroups: "tools.filterGroups"
            query: "tools.query"
            limit: "tools.limit"
            properties: "tools.properties"
          outputParameters:
            - type: object
              mapping: "$."
