naftiko: 1.0.0-alpha2
info:
  label: HubSpot Marketing Transactional Email API — SMTP Token Management
  description: 'HubSpot Marketing Transactional Email API — SMTP Token Management. 5 operations. Lead operation: Hubspot List
    All Smtp Tokens. Self-contained Naftiko capability covering one Hubspot business surface.'
  tags:
  - Hubspot
  - SMTP Token Management
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUBSPOT_API_KEY: HUBSPOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-emal-smtp-token-management
    baseUri: https://api.hubapi.com
    description: HubSpot Marketing Transactional Email API — SMTP Token Management business capability. Self-contained, no
      shared references.
    resources:
    - name: marketing-v3-transactional-smtp-tokens
      path: /marketing/v3/transactional/smtp-tokens
      operations:
      - name: listsmtptokens
        method: GET
        description: Hubspot List All Smtp Tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsmtptoken
        method: POST
        description: Hubspot Create an Smtp Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: marketing-v3-transactional-smtp-tokens-tokenId
      path: /marketing/v3/transactional/smtp-tokens/{tokenId}
      operations:
      - name: getsmtptokenbyid
        method: GET
        description: Hubspot Get an Smtp Token by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletesmtptoken
        method: DELETE
        description: Hubspot Delete an Smtp Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: marketing-v3-transactional-smtp-tokens-tokenId-password-reset
      path: /marketing/v3/transactional/smtp-tokens/{tokenId}/password-reset
      operations:
      - name: resetsmtptokenpassword
        method: POST
        description: Hubspot Reset Smtp Token Password
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.HUBSPOT_API_KEY}}'
  exposes:
  - type: rest
    namespace: marketing-emal-smtp-token-management-rest
    port: 8080
    description: REST adapter for HubSpot Marketing Transactional Email API — SMTP Token Management. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/marketing/v3/transactional/smtp-tokens
      name: marketing-v3-transactional-smtp-tokens
      description: REST surface for marketing-v3-transactional-smtp-tokens.
      operations:
      - method: GET
        name: listsmtptokens
        description: Hubspot List All Smtp Tokens
        call: marketing-emal-smtp-token-management.listsmtptokens
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsmtptoken
        description: Hubspot Create an Smtp Token
        call: marketing-emal-smtp-token-management.createsmtptoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/marketing/v3/transactional/smtp-tokens/{tokenid}
      name: marketing-v3-transactional-smtp-tokens-tokenid
      description: REST surface for marketing-v3-transactional-smtp-tokens-tokenId.
      operations:
      - method: GET
        name: getsmtptokenbyid
        description: Hubspot Get an Smtp Token by Id
        call: marketing-emal-smtp-token-management.getsmtptokenbyid
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesmtptoken
        description: Hubspot Delete an Smtp Token
        call: marketing-emal-smtp-token-management.deletesmtptoken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/marketing/v3/transactional/smtp-tokens/{tokenid}/password-reset
      name: marketing-v3-transactional-smtp-tokens-tokenid-password-reset
      description: REST surface for marketing-v3-transactional-smtp-tokens-tokenId-password-reset.
      operations:
      - method: POST
        name: resetsmtptokenpassword
        description: Hubspot Reset Smtp Token Password
        call: marketing-emal-smtp-token-management.resetsmtptokenpassword
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-emal-smtp-token-management-mcp
    port: 9090
    transport: http
    description: MCP adapter for HubSpot Marketing Transactional Email API — SMTP Token Management. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: hubspot-list-all-smtp-tokens
      description: Hubspot List All Smtp Tokens
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-emal-smtp-token-management.listsmtptokens
      outputParameters:
      - type: object
        mapping: $.
    - name: hubspot-create-smtp-token
      description: Hubspot Create an Smtp Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-emal-smtp-token-management.createsmtptoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: hubspot-get-smtp-token-id
      description: Hubspot Get an Smtp Token by Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-emal-smtp-token-management.getsmtptokenbyid
      outputParameters:
      - type: object
        mapping: $.
    - name: hubspot-delete-smtp-token
      description: Hubspot Delete an Smtp Token
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: marketing-emal-smtp-token-management.deletesmtptoken
      outputParameters:
      - type: object
        mapping: $.
    - name: hubspot-reset-smtp-token-password
      description: Hubspot Reset Smtp Token Password
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-emal-smtp-token-management.resetsmtptokenpassword
      outputParameters:
      - type: object
        mapping: $.
