      operations:
      - name: getdeal
        method: GET
        description: Hubspot Get a Deal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dealId
          in: path
          type: string
          description: The ID of the deal to retrieve.
          required: true
        - name: properties
          in: query
          type: string
          description: A comma-separated list of property names to return.
        - name: archived
          in: query
          type: boolean
          description: Whether to return archived deals.
      - name: updatedeal
        method: PATCH
        description: Hubspot Update a Deal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
