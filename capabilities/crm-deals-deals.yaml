      path: /crm/v3/objects/deals
      operations:
      - name: listdeals
        method: GET
        description: Hubspot List Deals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: The maximum number of results to return per page.
        - name: after
          in: query
          type: string
          description: The cursor for pagination to get the next page of results.
        - name: properties
          in: query
          type: string
          description: A comma-separated list of property names to return.
        - name: archived
          in: query
          type: boolean
          description: Whether to return archived deals.
      - name: createdeal
        method: POST
        description: Hubspot Create a Deal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: crm-v3-objects-deals-search
