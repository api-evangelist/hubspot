      operations:
      - name: searchdeals
        method: POST
        description: Hubspot Search Deals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: crm-v3-objects-deals-dealId
