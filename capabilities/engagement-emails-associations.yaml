naftiko: 1.0.0-alpha2
info:
  label: HubSpot Engagement Emails API — Associations
  description: 'HubSpot Engagement Emails API — Associations. 3 operations. Lead operation: Hubspot List Email Engagement
    Associations. Self-contained Naftiko capability covering one Hubspot business surface.'
  tags:
  - Hubspot
  - Associations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUBSPOT_API_KEY: HUBSPOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: engagement-emails-associations
    baseUri: https://api.hubapi.com
    description: HubSpot Engagement Emails API — Associations business capability. Self-contained, no shared references.
    resources:
    - name: crm-v3-objects-emails-emailId-associations-toObjectType
      path: /crm/v3/objects/emails/{emailId}/associations/{toObjectType}
      operations:
      - name: listemailengagementassociations
        method: GET
        description: Hubspot List Email Engagement Associations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: emailId
          in: path
          type: string
          description: The ID of the email engagement.
          required: true
        - name: toObjectType
          in: path
          type: string
          description: The type of associated object.
          required: true
    - name: crm-v3-objects-emails-emailId-associations-toObjectType-toObjectId-associationTy
      path: /crm/v3/objects/emails/{emailId}/associations/{toObjectType}/{toObjectId}/{associationType}
      operations:
      - name: createemailengagementassociation
        method: PUT
        description: Hubspot Create an Email Engagement Association
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: emailId
          in: path
          type: string
          required: true
        - name: toObjectType
          in: path
          type: string
          required: true
        - name: toObjectId
          in: path
          type: string
          required: true
        - name: associationType
          in: path
          type: string
          required: true
      - name: deleteemailengagementassociation
        method: DELETE
        description: Hubspot Delete an Email Engagement Association
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: emailId
          in: path
          type: string
          required: true
        - name: toObjectType
          in: path
          type: string
          required: true
        - name: toObjectId
          in: path
          type: string
          required: true
        - name: associationType
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.HUBSPOT_API_KEY}}'
  exposes:
  - type: rest
    namespace: engagement-emails-associations-rest
    port: 8080
    description: REST adapter for HubSpot Engagement Emails API — Associations. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/crm/v3/objects/emails/{emailid}/associations/{toobjecttype}
      name: crm-v3-objects-emails-emailid-associations-toobjecttype
      description: REST surface for crm-v3-objects-emails-emailId-associations-toObjectType.
      operations:
      - method: GET
        name: listemailengagementassociations
        description: Hubspot List Email Engagement Associations
        call: engagement-emails-associations.listemailengagementassociations
        with:
          emailId: rest.emailId
          toObjectType: rest.toObjectType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crm/v3/objects/emails/{emailid}/associations/{toobjecttype}/{toobjectid}/{associationtype}
      name: crm-v3-objects-emails-emailid-associations-toobjecttype-toobjectid-associationty
      description: REST surface for crm-v3-objects-emails-emailId-associations-toObjectType-toObjectId-associationTy.
      operations:
      - method: PUT
        name: createemailengagementassociation
        description: Hubspot Create an Email Engagement Association
        call: engagement-emails-associations.createemailengagementassociation
        with:
          emailId: rest.emailId
          toObjectType: rest.toObjectType
          toObjectId: rest.toObjectId
          associationType: rest.associationType
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteemailengagementassociation
        description: Hubspot Delete an Email Engagement Association
        call: engagement-emails-associations.deleteemailengagementassociation
        with:
          emailId: rest.emailId
          toObjectType: rest.toObjectType
          toObjectId: rest.toObjectId
          associationType: rest.associationType
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: engagement-emails-associations-mcp
    port: 9090
    transport: http
    description: MCP adapter for HubSpot Engagement Emails API — Associations. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: hubspot-list-email-engagement-associations
      description: Hubspot List Email Engagement Associations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: engagement-emails-associations.listemailengagementassociations
      with:
        emailId: tools.emailId
        toObjectType: tools.toObjectType
      outputParameters:
      - type: object
        mapping: $.
    - name: hubspot-create-email-engagement-association
      description: Hubspot Create an Email Engagement Association
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: engagement-emails-associations.createemailengagementassociation
      with:
        emailId: tools.emailId
        toObjectType: tools.toObjectType
        toObjectId: tools.toObjectId
        associationType: tools.associationType
      outputParameters:
      - type: object
        mapping: $.
    - name: hubspot-delete-email-engagement-association
      description: Hubspot Delete an Email Engagement Association
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: engagement-emails-associations.deleteemailengagementassociation
      with:
        emailId: tools.emailId
        toObjectType: tools.toObjectType
        toObjectId: tools.toObjectId
        associationType: tools.associationType
      outputParameters:
      - type: object
        mapping: $.
