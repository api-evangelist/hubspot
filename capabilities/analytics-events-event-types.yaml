naftiko: 1.0.0-alpha2
info:
  label: HubSpot Analytics Events API — Event Types
  description: 'HubSpot Analytics Events API — Event Types. 1 operations. Lead operation: Hubspot Retrieve Available Event
    Types. Self-contained Naftiko capability covering one Hubspot business surface.'
  tags:
  - Hubspot
  - Event Types
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUBSPOT_API_KEY: HUBSPOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: analytics-events-event-types
    baseUri: https://api.hubapi.com
    description: HubSpot Analytics Events API — Event Types business capability. Self-contained, no shared references.
    resources:
    - name: events-v3-events-event-types
      path: /events/v3/events/event-types
      operations:
      - name: geteventtypes
        method: GET
        description: Hubspot Retrieve Available Event Types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.HUBSPOT_API_KEY}}'
  exposes:
  - type: rest
    namespace: analytics-events-event-types-rest
    port: 8080
    description: REST adapter for HubSpot Analytics Events API — Event Types. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/events/v3/events/event-types
      name: events-v3-events-event-types
      description: REST surface for events-v3-events-event-types.
      operations:
      - method: GET
        name: geteventtypes
        description: Hubspot Retrieve Available Event Types
        call: analytics-events-event-types.geteventtypes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: analytics-events-event-types-mcp
    port: 9090
    transport: http
    description: MCP adapter for HubSpot Analytics Events API — Event Types. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: hubspot-retrieve-available-event-types
      description: Hubspot Retrieve Available Event Types
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: analytics-events-event-types.geteventtypes
      outputParameters:
      - type: object
        mapping: $.
