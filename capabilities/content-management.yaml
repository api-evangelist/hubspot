naftiko: 1.0.0-alpha1
info:
  label: HubSpot Content Management
  description: Content creation and management workflow for blog posts, authors, pages, domains, and source code.
  tags:
  - HubSpot
  - CMS
  - Content
  - Blogs
  created: '2026-04-18'
  modified: '2026-04-18'
binds:
- namespace: env
  keys:
    HUBSPOT_ACCESS_TOKEN: HUBSPOT_ACCESS_TOKEN
capability:
  consumes:
  - import: blog-posts-api
    location: ./shared/blog-posts-api.yaml
  - import: authors-api
    location: ./shared/authors-api.yaml
  - import: cms-pages-api
    location: ./shared/cms-pages-api.yaml
  - import: cms-hubdb-api
    location: ./shared/cms-hubdb-api.yaml
  - import: domains-api
    location: ./shared/domains-api.yaml
  - import: source-code-api
    location: ./shared/source-code-api.yaml
  exposes:
  - type: mcp
    port: 9091
    namespace: content-management-mcp
    transport: http
    description: MCP server for AI-assisted HubSpot Content Management.
    tools:
    - name: listblogposts
      description: HubSpot List All Blog Posts
      hints:
        readOnly: true
      call: blog-posts-api.listblogposts
    - name: createblogpost
      description: HubSpot Create a Blog Post
      hints:
        readOnly: false
      call: blog-posts-api.createblogpost
    - name: getblogpostbyid
      description: HubSpot Retrieve a Blog Post
      hints:
        readOnly: true
      call: blog-posts-api.getblogpostbyid
    - name: updateblogpost
      description: HubSpot Update a Blog Post
      hints:
        readOnly: false
      call: blog-posts-api.updateblogpost
    - name: archiveblogpost
      description: HubSpot Archive a Blog Post
      hints:
        destructive: true
      call: blog-posts-api.archiveblogpost
    - name: scheduleblogpost
      description: HubSpot Schedule a Blog Post
      hints:
        readOnly: false
      call: blog-posts-api.scheduleblogpost
    - name: cloneblogpost
      description: HubSpot Clone a Blog Post
      hints:
        readOnly: false
      call: blog-posts-api.cloneblogpost
    - name: pushblogpostdraftlive
      description: HubSpot Push Draft to Live
      hints:
        readOnly: false
      call: blog-posts-api.pushblogpostdraftlive
    - name: resetblogpostdraft
      description: HubSpot Reset Draft to Live Version
      hints:
        readOnly: false
      call: blog-posts-api.resetblogpostdraft
    - name: getblogpostrevisions
      description: HubSpot Get Revision History
      hints:
        readOnly: true
      call: blog-posts-api.getblogpostrevisions
    - name: restoreblogpostrevision
      description: HubSpot Restore a Previous Version
      hints:
        readOnly: false
      call: blog-posts-api.restoreblogpostrevision
    - name: batchreadblogposts
      description: HubSpot Read Multiple Blog Posts
      hints:
        readOnly: false
      call: blog-posts-api.batchreadblogposts
    - name: batchcreateblogposts
      description: HubSpot Create Multiple Blog Posts
      hints:
        readOnly: false
      call: blog-posts-api.batchcreateblogposts
    - name: batchupdateblogposts
      description: HubSpot Update Multiple Blog Posts
      hints:
        readOnly: false
      call: blog-posts-api.batchupdateblogposts
    - name: batcharchiveblogposts
      description: HubSpot Archive Multiple Blog Posts
      hints:
        readOnly: false
