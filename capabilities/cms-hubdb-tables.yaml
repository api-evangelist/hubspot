naftiko: 1.0.0-alpha2
info:
  label: HubSpot CMS HubDB API — Tables
  description: 'HubSpot CMS HubDB API — Tables. 6 operations. Lead operation: Hubspot List Hubdb Tables. Self-contained Naftiko
