          in: path
          type: string
          required: true
        - name: toObjectType
          in: path
          type: string
          required: true
        - name: toObjectId
          in: path
          type: string
          required: true
        - name: associationType
          in: path
          type: string
          required: true
      - name: deletemeetingassociation
