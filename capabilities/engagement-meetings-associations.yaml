        description: Hubspot Delete a Meeting Association
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: meetingId
          in: path
          type: string
          required: true
        - name: toObjectType
          in: path
          type: string
          required: true
        - name: toObjectId
          in: path
          type: string
          required: true
        - name: associationType
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.HUBSPOT_API_KEY}}'
  exposes:
