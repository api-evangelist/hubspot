components:
  parameters:
    AppIdPath:
      name: appId
      in: path
      required: true
      description: The unique identifier of the HubSpot application
      schema:
        type: integer
        format: int32
      example: 12345
    DefinitionIdPath:
      name: definitionId
      in: path
      required: true
      description: The unique identifier of the action definition
      schema:
        type: string
      example: action-def-001
    FunctionIdPath:
      name: functionId
      in: path
      required: true
      description: The unique identifier of the function
      schema:
        type: string
      example: func-xyz789
    FunctionTypePath:
      name: functionType
      in: path
      required: true
      description: The type of function to operate on
      schema:
        type: string
        enum:
        - PRE_ACTION_EXECUTION
        - PRE_FETCH_OPTIONS
        - POST_FETCH_OPTIONS
        - POST_ACTION_EXECUTION
      example: PRE_ACTION_EXECUTION
  schemas:
    ActionFunction:
      type: object
      description: A serverless function associated with an action
      required:
      - id
      - functionType
      - functionSource
      properties:
        id:
          type: string
          description: The unique identifier of the function
          example: '500123'
        functionType:
          type: string
          enum:
          - PRE_ACTION_EXECUTION
          - PRE_FETCH_OPTIONS
          - POST_FETCH_OPTIONS
          - POST_ACTION_EXECUTION
          description: The type of function
          example: PRE_ACTION_EXECUTION
        functionSource:
          type: string
          description: The JavaScript source code of the function
          example: example-value
    ErrorDetail:
      type: object
      description: Detailed error information
      required:
      - message
      properties:
        message:
          type: string
          description: The error message
          example: This is an example description.
        code:
          type: string
          description: An error code
          example: example-value
        in:
          type: string
          description: The location of the error
          example: example-value
        subCategory:
          type: string
          description: A specific error subcategory
          example: standard
        context:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            key: value
    ActionFunctionInput:
      type: object
      description: Input for creating or updating a function
      required:
      - functionSource
      properties:
        functionSource:
          type: string
          description: The JavaScript source code of the function
          example: example-value
    Error:
      type: object
      description: An error response
      required:
      - category
      - correlationId
      - message
      properties:
        category:
          type: string
          description: The error category
          example: standard
        correlationId:
          type: string
          format: uuid
          description: A unique identifier for this error instance
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        message:
          type: string
          description: A human-readable error message
          example: This is an example description.
        subCategory:
          type: string
          description: A more specific error category
          example: standard
        errors:
          type: array
          description: Detailed error information
          items:
            $ref: '#/components/schemas/ErrorDetail'
          example:
          - message: This is an example description.
            code: example-value
            in: example-value
            subCategory: standard
            context:
              key: value
        context:
          type: object
          description: Additional context about the error
          additionalProperties:
            type: array
            items:
              type: string
          example:
            key: value
        links:
          type: object
          description: Related links
          additionalProperties:
            type: string
          example:
            key: value
    ActionFunctionCollection:
      type: object
      description: A collection of action functions
      required:
      - results
      properties:
        results:
          type: array
          description: List of action functions
          items:
            $ref: '#/components/schemas/ActionFunction'
          example:
          - id: '500123'
            functionType: PRE_ACTION_EXECUTION
            functionSource: example-value
  examples:
    ActionFunctionSuccessExample:
      summary: Example action function
      value:
        id: func-xyz789
        functionType: PRE_ACTION_EXECUTION
        functionSource: 'exports.main = (event, callback) => { console.log(''Pre-execution hook''); callback({ outputFields: {} }); };'
    ActionFunctionCollectionSuccessExample:
      summary: Example collection of action functions
      value:
        results:
        - id: func-xyz789
          functionType: PRE_ACTION_EXECUTION
          functionSource: 'exports.main = (event, callback) => { callback({ outputFields: {} }); };'
        - id: func-abc123
          functionType: POST_ACTION_EXECUTION
          functionSource: exports.main = (event, callback) => { console.log('Action completed'); callback({}); };
    ActionFunctionInputExample:
      summary: Example action function input
      value:
        functionSource: 'exports.main = (event, callback) => { const result = processData(event.inputFields); callback({ outputFields: { result: result } }); };'
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://app.hubspot.com/oauth/authorize
          tokenUrl: https://api.hubapi.com/oauth/v1/token
          scopes:
            analytics.read: Read analytics data
