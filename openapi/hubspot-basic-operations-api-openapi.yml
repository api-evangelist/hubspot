      parameters:
      - $ref: '#/components/parameters/LimitParam'
        example: example-value
      - $ref: '#/components/parameters/AfterParam'
        example: example-value
      - $ref: '#/components/parameters/PropertiesParam'
        example: example-value
      - $ref: '#/components/parameters/PropertiesWithHistoryParam'
        example: example-value
      - $ref: '#/components/parameters/AssociationsParam'
        example: example-value
      - $ref: '#/components/parameters/ArchivedParam_2'
        example: example-value
      responses:
        '200':
          description: Successfully retrieved the list of notes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteCollectionResponse'
              examples:
                ListNotesSuccessResponse:
                  $ref: '#/components/examples/ListNotesSuccessResponse'
        default:
          description: An error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                ErrorResponse:
                  $ref: '#/components/examples/ErrorResponse'
      security:
      - OAuth2:
        - crm.objects.contacts.read
      - PrivateApp:
        - crm.objects.contacts.read
    post:
      tags:
      - Basic Operations
      summary: Hubspot Create a Note
      description: 'Creates a new note engagement in the CRM.

        You can specify note properties and optionally associate the note with other CRM objects.

        '
      operationId: createNote
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: 'return "CreateNoteSuccessResponse"

          '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteCreateRequest'
            examples:
              CreateNoteRequest:
                $ref: '#/components/examples/CreateNoteRequest'
      responses:
        '201':
          description: Successfully created the note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
              examples:
                CreateNoteSuccessResponse:
                  $ref: '#/components/examples/CreateNoteSuccessResponse'
        default:
          description: An error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                ErrorResponse:
                  $ref: '#/components/examples/ErrorResponse'
      security:
      - OAuth2:
        - crm.objects.contacts.write
      - PrivateApp:
        - crm.objects.contacts.write
  /crm/v3/objects/notes/{noteId}:
    get:
      tags:
      - Basic Operations
      summary: Hubspot Get a Note by Id
      description: 'Retrieves a single note engagement by its unique identifier.

        Optionally include specific properties, property history, and associations.

        '
      operationId: getNoteById
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: 'return "GetNoteSuccessResponse"

          '
      parameters:
      - $ref: '#/components/parameters/NoteIdParam'
        example: example-value
      - $ref: '#/components/parameters/PropertiesParam'
        example: example-value
      - $ref: '#/components/parameters/PropertiesWithHistoryParam'
        example: example-value
      - $ref: '#/components/parameters/AssociationsParam'
        example: example-value
      - $ref: '#/components/parameters/ArchivedParam_2'
        example: example-value
      responses:
        '200':
          description: Successfully retrieved the note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
              examples:
                GetNoteSuccessResponse:
                  $ref: '#/components/examples/GetNoteSuccessResponse'
        default:
          description: An error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                ErrorResponse:
                  $ref: '#/components/examples/ErrorResponse'
      security:
      - OAuth2:
        - crm.objects.contacts.read
      - PrivateApp:
        - crm.objects.contacts.read
    patch:
      tags:
      - Basic Operations
      summary: Hubspot Update a Note
      description: 'Updates an existing note engagement with new property values.

        Only the properties specified in the request body will be updated.

        '
      operationId: updateNote
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: 'return "UpdateNoteSuccessResponse"

          '
      parameters:
      - $ref: '#/components/parameters/NoteIdParam'
        example: example-value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteUpdateRequest'
            examples:
              UpdateNoteRequest:
