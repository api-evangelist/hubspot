openapi: 3.1.0
info:
  title: HubSpot Analytics Events Access Tokens Basic Operations API
  description: "The HubSpot Analytics Events API allows you to retrieve event completion data \nfrom your HubSpot account. Use this API to query event instances associated with \nCRM objects, filter by event types, and analyze user behavior and engagement patterns.\n\n## Key Features\n- Retrieve event instances for CRM objects\n- Filter events by type, date range, and object\n- Paginate through large result sets\n- Query available event types\n"
  version: 3.0.0
  contact:
    name: HubSpot Developer Support
    url: https://developers.hubspot.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
- url: https://api.hubapi.com
  description: HubSpot Production API Server
tags:
- name: Basic Operations
  description: Create, read, update, and delete individual call records
paths:
  /crm/v3/objects/calls:
    get:
      tags:
      - Basic Operations
      summary: Hubspot List All Calls
      description: 'Returns a paginated list of all call engagements in the CRM.

        Use query parameters to filter by properties, limit results, and paginate through records.

        '
      operationId: listCalls
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: 'return "ListCallsSuccessResponse"

          '
      parameters:
      - $ref: '#/components/parameters/LimitParam'
        example: example-value
      - $ref: '#/components/parameters/AfterParam'
        example: example-value
      - $ref: '#/components/parameters/PropertiesParam'
        example: example-value
      - $ref: '#/components/parameters/PropertiesWithHistoryParam'
        example: example-value
      - $ref: '#/components/parameters/AssociationsParam'
        example: example-value
      - $ref: '#/components/parameters/ArchivedParam'
        example: example-value
      responses:
        '200':
          description: Successfully retrieved the list of calls
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallCollectionResponse'
              examples:
                ListCallsSuccessResponse:
                  $ref: '#/components/examples/ListCallsSuccessResponse'
        default:
          description: An error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                ErrorResponse:
                  $ref: '#/components/examples/ErrorResponse'
      security:
      - OAuth2:
        - crm.objects.contacts.read
      - PrivateApp:
        - crm.objects.contacts.read
    post:
      tags:
      - Basic Operations
      summary: Hubspot Create a Call
      description: 'Creates a new call engagement in the CRM.

        You can specify call properties and optionally associate the call with other CRM objects.

        '
      operationId: createCall
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: 'return "CreateCallSuccessResponse"

          '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallCreateRequest'
            examples:
              CreateCallRequest:
                $ref: '#/components/examples/CreateCallRequest'
      responses:
        '201':
          description: Successfully created the call
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Call'
              examples:
                CreateCallSuccessResponse:
                  $ref: '#/components/examples/CreateCallSuccessResponse'
        default:
          description: An error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                ErrorResponse:
                  $ref: '#/components/examples/ErrorResponse'
      security:
      - OAuth2:
        - crm.objects.contacts.write
      - PrivateApp:
        - crm.objects.contacts.write
  /crm/v3/objects/calls/{callId}:
    get:
      tags:
      - Basic Operations
      summary: Hubspot Get a Call by Id
      description: 'Retrieves a single call engagement by its unique identifier.

        Optionally include specific properties, property history, and associations.

        '
      operationId: getCallById
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: 'return "GetCallSuccessResponse"

          '
      parameters:
      - $ref: '#/components/parameters/CallIdParam'
        example: example-value
      - $ref: '#/components/parameters/PropertiesParam'
        example: example-value
      - $ref: '#/components/parameters/PropertiesWithHistoryParam'
        example: example-value
      - $ref: '#/components/parameters/AssociationsParam'
        example: example-value
      - $ref: '#/components/parameters/ArchivedParam'
        example: example-value
      responses:
        '200':
          description: Successfully retrieved the call
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Call'
              examples:
                GetCallSuccessResponse:
                  $ref: '#/components/examples/GetCallSuccessResponse'
        default:
          description: An error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                ErrorResponse:
                  $ref: '#/components/examples/ErrorResponse'
      security:
      - OAuth2:
        - crm.objects.contacts.read
      - PrivateApp:
        - crm.objects.contacts.read
    patch:
      tags:
      - Basic Operations
      summary: Hubspot Update a Call
      description: 'Updates an existing call engagement with new property values.

        Only the properties specified in the request body will be updated.

        '
      operationId: updateCall
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: 'return "UpdateCallSuccessResponse"

          '
      parameters:
      - $ref: '#/components/parameters/CallIdParam'
        example: example-value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallUpdateRequest'
            examples:
              UpdateCallRequest:
                $ref: '#/components/examples/UpdateCallRequest'
      responses:
        '200':
          description: Successfully updated the call
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Call'
              examples:
                UpdateCallSuccessResponse:
                  $ref: '#/components/examples/UpdateCallSuccessResponse'
        default:
          description: An error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                ErrorResponse:
                  $ref: '#/components/examples/ErrorResponse'
      security:
      - OAuth2:
        - crm.objects.contacts.write
      - PrivateApp:
        - crm.objects.contacts.write
    delete:
      tags:
      - Basic Operations
      summary: Hubspot Archive a Call
      description: 'Archives (soft deletes) a call engagement by moving it to the recycling bin.

        Archived calls can be restored within 90 days.

        '
      operationId: archiveCall
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: 'return "ArchiveCallSuccessResponse"

          '
      parameters:
      - $ref: '#/components/parameters/CallIdParam'
        example: example-value
      responses:
        '204':
          description: Successfully archived the call (no content returned)
        default:
          description: An error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                ErrorResponse:
                  $ref: '#/components/examples/ErrorResponse'
      security:
      - OAuth2:
        - crm.objects.contacts.write
      - PrivateApp:
        - crm.objects.contacts.write
  /crm/v3/objects/notes:
    get:
      tags:
      - Basic Operations
      summary: Hubspot List All Notes
      description: 'Returns a paginated list of all note engagements in the CRM.

        Use query parameters to filter by properties, limit results, and paginate through records.

