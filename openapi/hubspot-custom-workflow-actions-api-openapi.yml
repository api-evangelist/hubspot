components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://app.hubspot.com/oauth/authorize
          tokenUrl: https://api.hubapi.com/oauth/v1/token
          scopes:
            automation: Access to automation API
    privateApp:
      type: apiKey
      in: header
      name: Authorization
      description: Private app access token with prefix "Bearer"

  parameters:
    CallbackIdPath:
      name: callbackId
      in: path
      required: true
      description: The unique identifier of the callback to complete
      schema:
        type: string
      example: "callback-abc123"

    AppIdPath:
      name: appId
      in: path
      required: true
      description: The unique identifier of the HubSpot application
      schema:
        type: integer
        format: int32
      example: 12345

    DefinitionIdPath:
      name: definitionId
      in: path
      required: true
      description: The unique identifier of the action definition
      schema:
        type: string
      example: "action-def-001"

    FunctionTypePath:
      name: functionType
      in: path
      required: true
      description: The type of function to operate on
      schema:
        type: string
        enum:
        - PRE_ACTION_EXECUTION
        - PRE_FETCH_OPTIONS
        - POST_FETCH_OPTIONS
        - POST_ACTION_EXECUTION
      example: "PRE_ACTION_EXECUTION"

    FunctionIdPath:
      name: functionId
      in: path
      required: true
      description: The unique identifier of the function
      schema:
        type: string
      example: "func-xyz789"

    RevisionIdPath:
      name: revisionId
      in: path
      required: true
      description: The unique identifier of the revision
      schema:
        type: string
      example: "rev-001"

    LimitQuery:
      name: limit
      in: query
      description: Maximum number of results to return per page
      schema:
        type: integer
        default: 100
        maximum: 500
      example: 100

    AfterQuery:
      name: after
      in: query
      description: Pagination cursor for the next page of results
      schema:
        type: string
      example: "NTI1Cg%3D%3D"

    ArchivedQuery:
      name: archived
      in: query
      description: Whether to include archived action definitions
      schema:
        type: boolean
        default: false
      example: false

  schemas:
    CallbackCompletionRequest:
      type: object
      description: Request body for completing a single callback
      required:
      - outputFields
      properties:
        outputFields:
          type: object
          description: The output values to return to the workflow
          additionalProperties:
            type: string

          example:
            key: value
    BatchCallbackCompletionRequest:
      type: object
      description: Request body for completing multiple callbacks
      required:
      - inputs
      properties:
        inputs:
          type: array
          description: List of callbacks to complete
          items:
            $ref: '#/components/schemas/BatchCallbackInput'

          example:
          - callbackId: '500123'
            outputFields:
              key: value
    BatchCallbackInput:
      type: object
      description: A single callback completion input
      required:
      - callbackId
      - outputFields
      properties:
        callbackId:
          type: string
          description: The unique identifier of the callback
          example: '500123'
        outputFields:
          type: object
          description: The output values to return
          additionalProperties:
            type: string

          example:
            key: value
    BatchCallbackResponse:
      type: object
      description: Response from a batch callback completion operation
      properties:
        status:
          type: string
          enum: [COMPLETE, PARTIAL]
          description: Overall status of the batch operation
          example: COMPLETE
        errors:
          type: array
          description: List of errors for failed callbacks
          items:
            $ref: '#/components/schemas/BatchCallbackError'

          example:
          - callbackId: '500123'
            message: This is an example description.
            category: standard
    BatchCallbackError:
      type: object
      description: Error information for a failed callback
      required:
      - callbackId
      - message
      - category
      properties:
        callbackId:
          type: string
          description: The callback that failed
          example: '500123'
        message:
          type: string
          description: Error message
          example: This is an example description.
        category:
          type: string
          description: Error category

          example: standard
    ActionDefinition:
      type: object
      description: A custom workflow action definition
      required:
      - id
      - revisionId
      - actionUrl
      - labels
      - objectTypes
      properties:
        id:
          type: string
          description: The unique identifier of the action definition
          example: '500123'
        revisionId:
          type: string
          description: The current revision identifier
          example: '500123'
        actionUrl:
          type: string
          format: uri
          description: The URL that HubSpot will call when the action executes
          example: https://app.hubspot.com/contacts/12345
        labels:
          $ref: '#/components/schemas/ActionLabels'
        inputFields:
          type: array
          description: Input fields that users can configure for the action
          items:
            $ref: '#/components/schemas/InputField'
          example: &id004
          - typeDefinition: {}
            supportedValueTypes:
            - {}
            isRequired: true
        outputFields:
          type: array
          description: Output fields that the action returns
          items:
            $ref: '#/components/schemas/OutputField'
          example: &id005
          - typeDefinition: {}
        objectTypes:
          type: array
          description: CRM object types this action can operate on
          items:
            type: string
            enum: [CONTACT, COMPANY, DEAL, TICKET, QUOTE]
          example: &id006
          - CONTACT
        objectRequestOptions:
          $ref: '#/components/schemas/ObjectRequestOptions'
        published:
          type: boolean
          description: Whether the action is published and available for use
          example: true
        functions:
          type: array
          description: Functions associated with this action
          items:
            $ref: '#/components/schemas/ActionFunctionReference'

          example: &id007
          - functionType: PRE_ACTION_EXECUTION
            id: '500123'
    ActionDefinitionInput:
      type: object
      description: Input for creating a new action definition
      required:
      - actionUrl
      - labels
      - objectTypes
      properties:
        actionUrl:
          type: string
          format: uri
          description: The URL that HubSpot will call when the action executes
          example: https://app.hubspot.com/contacts/12345
        labels:
          $ref: '#/components/schemas/ActionLabels'
        inputFields:
          type: array
