components:
  schemas:
    PropertyHistory:
      type: object
      description: A historical property value
      required:
      - value
      - timestamp
      - sourceType
      properties:
        value:
          type: string
          description: The property value
          example: example-value
        timestamp:
          type: string
          format: date-time
          description: When this value was set
          example: '2025-03-15T14:30:00Z'
        sourceType:
          type: string
          description: The source that set this value
          example: standard
        sourceId:
          type: string
          description: The identifier of the source
          example: '500123'
        sourceLabel:
          type: string
          description: A human-readable label for the source
          example: Example Record
        updatedByUserId:
          type: integer
          description: The user ID that made the change
          example: 1718153645993
    CommercePaymentCollection:
      type: object
      description: A paginated collection of commerce payments
      required:
      - results
      properties:
        results:
          type: array
          description: The list of commerce payments
          items:
            $ref: '#/components/schemas/CommercePayment'
          example:
          - id: '500123'
            properties:
              key: value
            createdAt: '2025-03-15T14:30:00Z'
            updatedAt: '2025-03-15T14:30:00Z'
            archived: true
            archivedAt: '2025-03-15T14:30:00Z'
            associations:
              key: value
            propertiesWithHistory:
              key: value
        paging:
          $ref: '#/components/schemas/Paging'
    ErrorDetail:
      type: object
      description: Detailed error information
      required:
      - message
      properties:
        message:
          type: string
          description: The error message
          example: This is an example description.
        code:
          type: string
          description: An error code
          example: example-value
        in:
          type: string
          description: The location of the error
          example: example-value
        subCategory:
          type: string
          description: A specific error subcategory
          example: standard
        context:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            key: value
    CommercePaymentPatch:
      type: object
      description: Input for updating a commerce payment
      required:
      - properties
      properties:
        properties:
          type: object
          description: The properties to update on the commerce payment
          additionalProperties:
            type: string
          example:
            key: value
    Paging:
      type: object
      description: Pagination information
      properties:
        next:
          type: object
          properties:
            after:
              type: string
              description: Cursor for the next page
            link:
              type: string
              description: Link to the next page
          example:
            after: example-value
            link: https://app.hubspot.com/contacts/12345
        prev:
          type: object
          properties:
            before:
              type: string
              description: Cursor for the previous page
            link:
              type: string
              description: Link to the previous page
          example:
            before: example-value
            link: https://app.hubspot.com/contacts/12345
    AssociationResult:
      type: object
      description: Association results for an object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
          example:
          - id: '500123'
            type: standard
        paging:
          $ref: '#/components/schemas/Paging'
    AssociationInput:
      type: object
      description: Input for creating an association
      required:
      - to
      - types
      properties:
        to:
          type: object
          required:
          - id
          properties:
            id:
              type: string
              description: The ID of the object to associate with
          example:
            id: '500123'
        types:
          type: array
          description: The association types
          items:
            $ref: '#/components/schemas/AssociationType'
          example:
          - associationCategory: HUBSPOT_DEFINED
            associationTypeId: 500123
    Error:
      type: object
      description: An error response
      required:
      - category
      - correlationId
      - message
      properties:
        category:
          type: string
          description: The error category
          example: standard
        correlationId:
          type: string
          format: uuid
          description: A unique identifier for this error instance
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        message:
          type: string
          description: A human-readable error message
          example: This is an example description.
        subCategory:
          type: string
          description: A more specific error category
          example: standard
        errors:
          type: array
          description: Detailed error information
          items:
            $ref: '#/components/schemas/ErrorDetail'
          example:
          - message: This is an example description.
            code: example-value
            in: example-value
            subCategory: standard
            context:
              key: value
        context:
          type: object
          description: Additional context about the error
          additionalProperties:
            type: array
            items:
              type: string
          example:
            key: value
        links:
          type: object
          description: Related links
          additionalProperties:
            type: string
          example:
            key: value
    AssociationType:
      type: object
      description: An association type definition
      required:
      - associationCategory
      - associationTypeId
      properties:
        associationCategory:
          type: string
          enum:
          - HUBSPOT_DEFINED
          - USER_DEFINED
          - INTEGRATOR_DEFINED
          description: The category of the association
          example: HUBSPOT_DEFINED
        associationTypeId:
          type: integer
          description: The numeric ID of the association type
          example: 500123
    CommercePayment:
      type: object
      description: A commerce payment object representing a payment transaction
      required:
      - id
      - properties
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          description: The unique identifier of the commerce payment
          example: '500123'
        properties:
          type: object
          description: The properties of the commerce payment
          additionalProperties:
            type: string
          example:
            key: value
        createdAt:
          type: string
          format: date-time
          description: When the commerce payment was created
          example: '2025-03-15T14:30:00Z'
        updatedAt:
          type: string
          format: date-time
          description: When the commerce payment was last updated
          example: '2025-03-15T14:30:00Z'
        archived:
          type: boolean
          description: Whether the commerce payment is archived
          example: true
        archivedAt:
          type: string
          format: date-time
          description: When the commerce payment was archived
          example: '2025-03-15T14:30:00Z'
        associations:
          type: object
          description: Associated objects
          additionalProperties:
            $ref: '#/components/schemas/AssociationResult'
          example:
            key: value
        propertiesWithHistory:
          type: object
          description: Properties with their value history
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/PropertyHistory'
          example:
            key: value
    CommercePaymentInput:
      type: object
      description: Input for creating a new commerce payment
      required:
      - properties
      properties:
        properties:
          type: object
          description: The properties to set on the commerce payment
          additionalProperties:
            type: string
          example:
            key: value
        associations:
          type: array
          description: Associations to create with other objects
          items:
            $ref: '#/components/schemas/AssociationInput'
          example:
          - to:
              id: {}
            types:
            - {}
  examples:
    GetCommercePaymentSuccessExample:
      summary: Successful get payment response
      value:
        id: '12345678901'
        properties:
          hs_payment_status: completed
          hs_amount: '150.00'
          hs_currency: USD
          hs_payment_method: credit_card
        createdAt: '2024-01-15T10:30:00Z'
        updatedAt: '2024-01-15T14:45:00Z'
        archived: false
        associations:
          contacts:
            results:
            - id: '501'
              type: commerce_payment_to_contact
    CreateCommercePaymentSuccessExample:
      summary: Successful create payment response
      value:
        id: '12345678905'
        properties:
          hs_payment_status: pending
          hs_amount: '350.00'
          hs_currency: USD
          hs_payment_method: credit_card
          hs_external_payment_id: ext-pay-12345
        createdAt: '2024-01-20T12:00:00Z'
        updatedAt: '2024-01-20T12:00:00Z'
        archived: false
    CreateCommercePaymentRequestExample:
      summary: Example create payment request
      value:
        properties:
          hs_payment_status: pending
          hs_amount: '350.00'
          hs_currency: USD
          hs_payment_method: credit_card
          hs_external_payment_id: ext-pay-12345
        associations:
        - to:
            id: '501'
          types:
          - associationCategory: HUBSPOT_DEFINED
            associationTypeId: 187
    UpdateCommercePaymentSuccessExample:
      summary: Successful update payment response
      value:
        id: '12345678901'
        properties:
          hs_payment_status: completed
          hs_amount: '150.00'
          hs_currency: USD
          hs_notes: Payment processed successfully
        createdAt: '2024-01-15T10:30:00Z'
        updatedAt: '2024-01-20T13:00:00Z'
        archived: false
    UpdateCommercePaymentRequestExample:
      summary: Example update payment request
      value:
        properties:
          hs_payment_status: completed
          hs_notes: Payment processed successfully
    ListCommercePaymentsSuccessExample:
      summary: Successful list payments response
