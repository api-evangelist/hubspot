      tags:
      - Action Definitions
      summary: Hubspot Archive an Action Definition
      description: "Archives (soft deletes) a custom action definition. Archived definitions can be \nrestored by updating their archived status. Active workflows using this action \nwill continue to work until modified.\n"
      operationId: archiveActionDefinitionById
