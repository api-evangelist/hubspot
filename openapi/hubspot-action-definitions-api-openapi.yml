    patch:
      tags:
      - Action Definitions
      summary: Hubspot Update an Action Definition
      description: "Updates an existing custom action definition with the provided changes. \nOnly the specified fields will be updated; other fields remain unchanged.\n"
      operationId: updateActionDefinitionById
      x-microcks-operation:
